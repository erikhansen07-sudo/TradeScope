    // =========================================================================
    // ENGINES
    // =========================================================================
    function evalExpr(expr, ctx) {
      const s = String(expr).trim();
      if (/^-?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
      try {
        const keys = Object.keys(ctx), vals = keys.map(k => ctx[k]);
        const r = new Function(...keys, `return (${s});`)(...vals);
        return isFinite(r) ? Number(r) : 0;
      } catch(e) { return 0; }
    }

    function evalCond(cond, ctx) {
      if (!cond) return true;
      try {
        const keys = Object.keys(ctx), vals = keys.map(k => ctx[k]);
        return Boolean(new Function(...keys, `return (${cond});`)(...vals));
      } catch(e) { return false; }
    }

    function resolveRateKey(liDef, inputs) {
      if (liDef.rateKey) return liDef.rateKey;
      if (liDef.rateSelector) {
        const [ik, map] = Object.entries(liDef.rateSelector)[0];
        return map[inputs[ik]] || null;
      }
      return null;
    }

    function computeLineItems(asmDef, inputs, tier, overrides = {}) {
      const ctx = { ...inputs };
      if (asmDef.calculations)
        for (const [k, f] of Object.entries(asmDef.calculations)) ctx[k] = evalExpr(f, ctx);

      return asmDef.lineItems.flatMap((liDef, i) => {
        if (liDef.condition && !evalCond(liDef.condition, ctx)) return [];
        const qty = evalExpr(liDef.quantityFormula, ctx);
        if (qty <= 0) return [];

        let rateKey, label, unit, category, baseUnitCost;
        if (liDef.rateKey || liDef.rateSelector) {
          rateKey = resolveRateKey(liDef, inputs);
          const r = DB.rates[rateKey]; if (!r) return [];
          ({ label, unit, category } = r); baseUnitCost = r[tier];
        } else if (liDef.customItem) {
          rateKey = `__c_${asmDef.id}_${i}`;
          ({ label, unit, category } = liDef.customItem);
          baseUnitCost = evalExpr(liDef.unitCostFormula, ctx);
        } else return [];

        const unitCost = overrides[rateKey] !== undefined ? overrides[rateKey] : baseUnitCost;
        const q = Math.round(qty * 100) / 100;
        const costType = liDef.customItem ? "material" : "labor";
        return [{ id: `${asmDef.id}_${i}`, rateKey, label, unit, category, qty: q, unitCost, baseUnitCost, total: Math.round(q * unitCost * 100) / 100, isOverridden: overrides[rateKey] !== undefined, isCustom: !!liDef.customItem, costType }];
      });
    }

    // STORAGE

    const SK = "tradescope_v2";

    const save = d => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) {} };

    const fmtPct  = n => `${(n*100).toFixed(0)}%`;
    let _id = Date.now(); const uid = () => `ts_${_id++}`;

      const cats = new Set();
      Object.values(DB.rates).forEach(r => cats.add(r.category));
      DB.assemblies.forEach(asm => asm.lineItems.forEach(li => { if (li.customItem) cats.add(li.customItem.category); }));
      return [...cats].sort().concat(["Other"]);
    })();

    // =========================================================================
    // ICONS (inline SVG — no external dependency)
    // =========================================================================
    const Svg = ({d, className="w-4 h-4", multi}) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round">
        {multi ? multi.map((p,i) => <path key={i} d={p}/>) : <path d={d}/>}
      </svg>
    );
    const IconPlus      = ({c}) => <Svg className={c||"w-3.5 h-3.5"} d="M12 4v16m8-8H4"/>;
    const IconTrash     = ({c}) => <Svg className={c||"w-3.5 h-3.5"} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>;
    const IconEdit      = ({c}) => <Svg className={c||"w-3.5 h-3.5"} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>;
    const IconDown      = ({c}) => <Svg className={c||"w-4 h-4"}   d="M19 9l-7 7-7-7"/>;
    const IconRight     = ({c}) => <Svg className={c||"w-4 h-4"}   d="M9 5l7 7-7 7"/>;
    const IconX         = ({c}) => <Svg className={c||"w-4 h-4"}   d="M6 18L18 6M6 6l12 12"/>;
    const IconSettings  = ({c}) => <Svg className={c||"w-4 h-4"}   multi={["M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z","M15 12a3 3 0 11-6 0 3 3 0 016 0z"]}/>;
    const IconBuilding  = ({c}) => <Svg className={c||"w-6 h-6"}   d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>;
    const IconAlert     = ({c}) => <Svg className={c||"w-4 h-4"}   d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>;
    const IconReset     = ({c}) => <Svg className={c||"w-3 h-3"}   d="M3 10a9 9 0 019-9m0 0v4m0-4L9 4m3-3l3 3m6 5a9 9 0 01-9 9m0 0v-4m0 4l-3-3m3 3l3-3"/>;
    const IconTracker   = ({c}) => <Svg className={c||"w-4 h-4"}   d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>;
    const IconEstimate  = ({c}) => <Svg className={c||"w-4 h-4"}   d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>;

    // =========================================================================
    // COMPONENTS
    // =========================================================================

    function TierSelector({ tier, onChange }) {
      const opts = [
        { k:"low",  l:"Low",  a:"bg-emerald-500 text-white", i:"bg-gray-800 text-gray-400 hover:bg-gray-700" },
        { k:"mid",  l:"Mid",  a:"bg-blue-500 text-white",    i:"bg-gray-800 text-gray-400 hover:bg-gray-700" },
        { k:"high", l:"High", a:"bg-amber-500 text-white",   i:"bg-gray-800 text-gray-400 hover:bg-gray-700" },
      ];
      return (
        <div className="flex items-center gap-1">
          <span className="text-gray-400 text-xs mr-1">Pricing:</span>
          <div className="flex rounded-lg overflow-hidden border border-gray-600">
            {opts.map(o => (
              <button key={o.k} onClick={() => onChange(o.k)} className={`px-3 py-1 text-xs font-semibold transition-colors ${tier===o.k ? o.a : o.i}`}>{o.l}</button>
            ))}
          </div>
        </div>
      );
    }

    function AssemblyPalette({ onAdd }) {
      const byGroup = {};
      GROUPS.forEach(g => { byGroup[g] = DB.assemblies.filter(a => a.group === g); });
      return (
        <div className="h-full flex flex-col bg-gray-50 border-r border-gray-200">
          <div className="px-3 py-3 border-b border-gray-200">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Assembly Palette</p>
          </div>
          <div className="flex-1 overflow-y-auto px-2 py-2 space-y-3">
            {GROUPS.map(g => (
              <div key={g}>
                <p className="text-[10px] font-semibold uppercase tracking-widest text-gray-400 px-1 mb-1">{g}</p>
                <div className="space-y-0.5">
                  {byGroup[g].map(def => (
                    <button key={def.id} onClick={() => onAdd(def)}
                      className="w-full text-left flex items-center gap-2 px-2.5 py-2 text-xs rounded-md border border-gray-200 bg-white text-gray-700 hover:bg-blue-50 hover:text-blue-700 hover:border-blue-300 transition-all">
                      <IconPlus /> <span className="truncate font-medium">{def.name}</span>

    function AssemblyFormModal({ asmDef, initialInputs, onSave, onClose }) {
      const getDefault = inp => {
        if (initialInputs && initialInputs[inp.key] !== undefined)
          return inp.type === "percent" ? (initialInputs[inp.key] * 100).toFixed(1) : initialInputs[inp.key];
        if (inp.default !== undefined) return inp.type === "percent" ? (inp.default * 100).toFixed(1) : inp.default;
        if (inp.type === "boolean") return false;
        if (inp.type === "select") return inp.options[0];
        return "";
      };
      const [vals, setVals] = useState(() => { const o={}; asmDef.inputs.forEach(i => o[i.key]=getDefault(i)); return o; });
      const set = (k,v) => setVals(p => ({...p,[k]:v}));

      const handleSubmit = e => {
        e.preventDefault();
        const out = {};
        asmDef.inputs.forEach(inp => {
          if (inp.type==="number")  out[inp.key] = parseFloat(vals[inp.key])||0;
          else if (inp.type==="percent") out[inp.key] = (parseFloat(vals[inp.key])||0)/100;
          else out[inp.key] = vals[inp.key];
        });
        onSave(out);
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <div>
                <h3 className="text-base font-bold text-gray-900">{initialInputs?"Edit":"Add"} — {asmDef.name}</h3>
                <p className="text-xs text-gray-400 mt-0.5">Enter quantities to generate line items</p>
              </div>
              <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg"><IconX /></button>
            </div>
            <form onSubmit={handleSubmit} className="px-6 py-5 space-y-4">
              {asmDef.inputs.map(inp => (
                <div key={inp.key}>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    {inp.label}{inp.required && <span className="text-red-400 ml-1">*</span>}
                  </label>
                  {(inp.type==="number"||inp.type==="percent") && (
                    <div className="relative">
                      <input type="number" step="any" min="0" required={inp.required} value={vals[inp.key]}
                        onChange={e => set(inp.key, e.target.value)}
                        placeholder={inp.default!==undefined ? `Default: ${inp.type==="percent"?(inp.default*100).toFixed(0):inp.default}` : ""}
                        className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      {inp.type==="percent" && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">%</span>}
                    </div>
                  )}
                  {inp.type==="text" && (
                    <input type="text" value={vals[inp.key]} onChange={e => set(inp.key, e.target.value)}
                      className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                  )}
                  {inp.type==="boolean" && (
                    <button type="button" onClick={() => set(inp.key,!vals[inp.key])}
                      className={`flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg border text-sm font-medium transition-all ${vals[inp.key]?"bg-blue-50 border-blue-300 text-blue-700":"bg-white border-gray-300 text-gray-600 hover:bg-gray-50"}`}>
                      <div className={`w-4 h-4 rounded border-2 flex items-center justify-center flex-shrink-0 ${vals[inp.key]?"bg-blue-500 border-blue-500":"border-gray-400"}`}>
                        {vals[inp.key] && <svg className="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 10 10"><path d="M1.5 5l2.5 2.5L8.5 2" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                      {vals[inp.key]?"Yes — Included":"No — Excluded"}
                    </button>
                  )}
                  {inp.type==="select" && (
                    <select value={vals[inp.key]} onChange={e => set(inp.key,e.target.value)}
                      className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                      {inp.options.map(o => <option key={o} value={o}>{OPTION_LABELS[o]||o}</option>)}
                    </select>
                  )}
                </div>
              ))}
              <div className="flex gap-3 pt-2">
                <button type="button" onClick={onClose} className="flex-1 px-4 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50">Cancel</button>
                <button type="submit" className="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700">{initialInputs?"Update Assembly":"Add to Estimate"}</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function LineItemRow({ item, onOverride, onReset }) {
      const [editing, setEditing] = useState(false);
      const [editVal, setEditVal] = useState("");
      const startEdit = () => { setEditVal(item.unitCost.toFixed(2)); setEditing(true); };
      const commit = () => { const v=parseFloat(editVal); if(!isNaN(v)&&v>=0) onOverride(item.rateKey,v); setEditing(false); };

      return (
        <tr className={`group transition-colors ${item.isOverridden?"bg-amber-50/60":"hover:bg-gray-50/80"}`}>
          <td className="py-2 pl-5 pr-3 text-sm">
            <div className="flex items-start gap-1.5">
              {item.isOverridden && <span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0"/>}
              <div><span className="text-gray-800">{item.label}</span><span className="block text-[11px] text-gray-400">{item.category}</span></div>
            </div>
          </td>
          <td className="py-2 px-3 text-sm text-right text-gray-500 tabular-nums whitespace-nowrap">
            {item.qty.toLocaleString()} <span className="text-gray-400">{item.unit}</span>
          </td>
          <td className="py-2 px-3 text-sm text-right tabular-nums">
            {editing ? (
              <div className="flex items-center justify-end gap-0.5">
                <span className="text-gray-400 text-xs">$</span>
                <input autoFocus type="number" step="0.01" min="0" value={editVal}
                  onChange={e=>setEditVal(e.target.value)} onBlur={commit}
                  onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}}
                  className="w-20 px-1.5 py-0.5 text-right border border-blue-400 rounded text-sm focus:outline-none"/>
              </div>
            ) : (
              <div className="flex items-center justify-end gap-1">
                <span className={item.isOverridden?"text-amber-600 font-medium":"text-gray-600"}>{fmtUSD2(item.unitCost)}</span>
                <div className="flex opacity-0 group-hover:opacity-100 transition-opacity">
                  <button onClick={startEdit} className="p-0.5 text-gray-400 hover:text-blue-500" title="Override"><IconEdit /></button>
                  {item.isOverridden && !item.isCustom && <button onClick={()=>onReset(item.rateKey)} className="p-0.5 text-amber-400 hover:text-amber-600" title="Reset"><IconReset /></button>}
                </div>
              </div>
            )}
          </td>
          <td className="py-2 pl-3 pr-5 text-sm text-right font-semibold text-gray-800 tabular-nums">{fmtUSD(item.total)}</td>
        </tr>
      );
    }

    function AssemblyCard({ instance, asmDef, tier, rateOverrides, onEdit, onRemove, onRateOverride, onResetRateOverride }) {
      const [collapsed, setCollapsed] = useState(false);
      const lineItems = useMemo(() => computeLineItems(asmDef, instance.inputs, tier, rateOverrides), [asmDef, instance.inputs, tier, rateOverrides]);
      const subtotal = lineItems.reduce((s,i) => s+i.total, 0);
      const summary = asmDef.inputs.filter(i=>(i.type==="number"||i.type==="percent")&&instance.inputs[i.key]).slice(0,2)
        .map(i=>{ const v=instance.inputs[i.key]; const u=i.key.toLowerCase().includes("feet")?(i.key.includes("linear")?" LF":" SF"):""; return `${i.type==="percent"?(v*100).toFixed(0)+"%":v}${u}`; }).join(" · ");

      return (
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <div className="flex items-center gap-3 px-4 py-3 bg-gray-50/80 border-b border-gray-100 cursor-pointer select-none" onClick={()=>setCollapsed(!collapsed)}>
            <span className="text-gray-400 flex-shrink-0">{collapsed?<IconRight/>:<IconDown/>}</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="font-semibold text-gray-900 text-sm">{asmDef.name}</span>
                <span className={`text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded-full ${GROUP_COLOR[asmDef.group]}`}>{asmDef.group}</span>
                {summary && <span className="text-xs text-gray-400">{summary}</span>}
              </div>
              <p className="text-[11px] text-gray-400 mt-0.5">{lineItems.length} item{lineItems.length!==1?"s":""}</p>
            </div>
            <div className="text-right flex-shrink-0"><div className="font-bold text-gray-900 text-sm tabular-nums">{fmtUSD(subtotal)}</div></div>
            <div className="flex items-center gap-0.5 ml-1 flex-shrink-0" onClick={e=>e.stopPropagation()}>
              <button onClick={()=>onEdit(instance)} className="p-1.5 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded-lg transition-colors" title="Edit"><IconEdit /></button>
              <button onClick={()=>onRemove(instance.id)} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Remove"><IconTrash /></button>
            </div>
          </div>
          {!collapsed && (
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead><tr className="border-b border-gray-100">
                  <th className="py-2 pl-5 pr-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Description</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Quantity</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Unit Cost</th>
                  <th className="py-2 pl-3 pr-5 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Total</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-50">
                  {lineItems.map(item => <LineItemRow key={item.id} item={item} onOverride={onRateOverride} onReset={onResetRateOverride}/>)}
                </tbody>
                <tfoot><tr className="border-t border-gray-200 bg-gray-50/50">
                  <td colSpan={3} className="py-2.5 pl-5 pr-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Assembly Subtotal</td>
                  <td className="py-2.5 pl-3 pr-5 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(subtotal)}</td>
                </tr></tfoot>
              </table>
            </div>
          )}
        </div>
      );
    }

    function SettingsModal({ settings, onUpdate, onClose }) {
      const [local, setLocal] = useState({...settings});
      const fields = [
        { key:"contingencyPct", label:"Contingency", hint:"Applied to direct costs" },
        { key:"overheadPct",    label:"Overhead",    hint:"Applied after contingency" },
        { key:"profitPct",      label:"Profit",      hint:"Applied after contingency" },
        { key:"salesTaxPct",    label:"Sales Tax",   hint:"Applied to direct costs" },
      ];
      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <div><h3 className="font-bold text-gray-900">Estimate Settings</h3><p className="text-xs text-gray-400 mt-0.5">Modifiers applied to all line items</p></div>
              <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg"><IconX /></button>
            </div>
            <div className="px-6 py-5 space-y-4">
              {fields.map(({key,label,hint}) => (
                <div key={key} className="flex items-center justify-between gap-4">
                  <div><p className="text-sm font-medium text-gray-700">{label}</p><p className="text-xs text-gray-400">{hint}</p></div>
                  <div className="flex items-center gap-1.5 flex-shrink-0">
                    <input type="number" step="0.5" min="0" max="100" value={(local[key]*100).toFixed(1)}
                      onChange={e=>setLocal(s=>({...s,[key]:parseFloat(e.target.value)/100||0}))}
                      className="w-20 px-2 py-1.5 text-right border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                    <span className="text-sm text-gray-400 w-4">%</span>
                  </div>
                </div>
              ))}
            </div>
            <div className="px-6 py-4 border-t border-gray-100 flex gap-3">
              <button onClick={onClose} className="flex-1 px-4 py-2.5 text-sm font-medium text-gray-700 border border-gray-300 rounded-xl hover:bg-gray-50">Cancel</button>
              <button onClick={()=>{onUpdate(local);onClose();}} className="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700">Save Settings</button>
            </div>
          </div>
        </div>
      );
    }

    function SRow({ label, value, bold, sub }) {
      return (
        <div className={`flex items-center justify-between ${sub?"pl-2":""}`}>
          <span className={`text-xs ${bold?"font-semibold text-gray-800":"text-gray-500"}`}>{label}</span>
          <span className={`text-xs tabular-nums ${bold?"font-semibold text-gray-800":"text-gray-500"}`}>{value}</span>
        </div>
      );
    }

    function SummaryPanel({ instances, tier, rateOverrides, settings, onSettingsOpen }) {
      const allItems = useMemo(() => instances.flatMap(inst => {
        const def = DB.assemblies.find(a => a.id===inst.assemblyId); if(!def) return [];
        return computeLineItems(def, inst.inputs, tier, rateOverrides);
      }), [instances, tier, rateOverrides]);

      const direct = allItems.reduce((s,i)=>s+i.total, 0);
      const contingency = direct * settings.contingencyPct;
      const base = direct + contingency;
      const overhead = base * settings.overheadPct;
      const profit = base * settings.profitPct;
      const tax = direct * settings.salesTaxPct;
      const total = base + overhead + profit + tax;
      const margin = total > 0 ? ((total-direct)/total*100).toFixed(1) : 0;

      const byCategory = {};
      allItems.forEach(i => { byCategory[i.category]=(byCategory[i.category]||0)+i.total; });
      const cats = Object.entries(byCategory).sort(([,a],[,b])=>b-a);

      const tierBadge = { low:"bg-emerald-100 text-emerald-700 border-emerald-200", mid:"bg-blue-100 text-blue-700 border-blue-200", high:"bg-amber-100 text-amber-700 border-amber-200" };

      return (
        <div className="h-full bg-white border-l border-gray-200 flex flex-col overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
            <div>
              <h2 className="font-bold text-gray-900 text-sm">Cost Summary</h2>
              <span className={`inline-block mt-0.5 px-2 py-0.5 text-[10px] font-semibold rounded-full border ${tierBadge[tier]}`}>{tier.charAt(0).toUpperCase()+tier.slice(1)} Pricing</span>
            </div>
            <button onClick={onSettingsOpen} className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg" title="Settings"><IconSettings /></button>
          </div>
          <div className="flex-1 overflow-y-auto">
            {direct===0 ? (
              <div className="flex flex-col items-center justify-center h-40 text-center px-4">
                <IconBuilding c="w-8 h-8 text-gray-200 mx-auto mb-2"/>
                <p className="text-xs text-gray-400">Add assemblies to see cost summary</p>
              </div>
            ) : (<>
              <div className="px-4 py-4 border-b border-gray-100">
                <p className="text-[10px] font-semibold uppercase tracking-widest text-gray-400 mb-3">Breakdown</p>
                <div className="space-y-2.5">
                  <SRow label="Direct Costs" value={fmtUSD(direct)} bold/>
                  <SRow label={`Contingency (${fmtPct(settings.contingencyPct)})`} value={`+ ${fmtUSD(contingency)}`} sub/>
                  <div className="border-t border-gray-100 pt-2.5"><SRow label="Cost w/ Contingency" value={fmtUSD(base)} bold/></div>
                  <SRow label={`Overhead (${fmtPct(settings.overheadPct)})`} value={`+ ${fmtUSD(overhead)}`} sub/>
                  <SRow label={`Profit (${fmtPct(settings.profitPct)})`} value={`+ ${fmtUSD(profit)}`} sub/>
                  {settings.salesTaxPct>0 && <SRow label={`Tax (${fmtPct(settings.salesTaxPct)})`} value={`+ ${fmtUSD(tax)}`} sub/>}
                </div>
                <div className="mt-4 pt-3 border-t-2 border-gray-900">
                  <div className="flex items-baseline justify-between">
                    <span className="font-bold text-gray-900 text-sm">Total Sell Price</span>
                    <span className="font-black text-gray-900 text-xl tabular-nums">{fmtUSD(total)}</span>
                  </div>
                  <div className="flex justify-between mt-1 text-xs text-gray-400">
                    <span>Gross Margin</span><span className="tabular-nums font-medium">{margin}%</span>
                  </div>
                </div>
              </div>
              {cats.length > 0 && (
                <div className="px-4 py-4">
                  <p className="text-[10px] font-semibold uppercase tracking-widest text-gray-400 mb-3">By Trade</p>
                  <div className="space-y-3">
                    {cats.map(([cat,amt]) => (
                      <div key={cat}>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="text-gray-600 font-medium truncate">{cat}</span>
                          <span className="text-gray-500 tabular-nums ml-2 flex-shrink-0">{fmtUSD(amt)}</span>
                        </div>
                        <div className="w-full bg-gray-100 rounded-full h-1.5">
                          <div className="bg-blue-500 h-1.5 rounded-full" style={{width:`${direct>0?(amt/direct*100):0}%`}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>)}
          </div>
        </div>
      );
    }

    // =========================================================================
    // TRACKER MODULE
    // =========================================================================
    function CatTable({ title, rows, spentByCat, catProgress, onProgressChange }) {
      if (rows.length === 0) return null;
      return (
        <div className="overflow-hidden">
          <div className="px-4 py-2 bg-gray-100 border-b border-gray-200">
            <p className="text-[11px] font-bold uppercase tracking-widest text-gray-500">{title}</p>
          </div>
          <tbody className="divide-y divide-gray-50">
            {rows.map(({ cat, budget }) => {
              const actual = spentByCat[cat] || 0;
              const rawPct = catProgress[cat] !== undefined ? catProgress[cat] : 0;
              const pctDone = Math.min(100, Math.max(0, rawPct));
              // Projected: at 100% done → actual; at 0% or no actual → budget; else extrapolate
              let projected;
              if (pctDone >= 100) projected = actual;
              else if (pctDone === 0 || actual === 0) projected = budget;
              else projected = actual / (pctDone / 100);
              const variance = budget - projected;
              return (
                <tr key={cat} className="hover:bg-gray-50/60 group">
                  <td className="py-2.5 pl-4 pr-3 text-sm text-gray-700 font-medium">{cat}</td>
                  <td className="py-2.5 px-3 text-sm text-right text-gray-500 tabular-nums">{budget > 0 ? fmtUSD(budget) : "—"}</td>
                  <td className="py-2.5 px-3 text-sm text-right text-gray-500 tabular-nums">{actual > 0 ? fmtUSD(actual) : "—"}</td>
                  <td className="py-2.5 px-3">
                    <div className="flex items-center justify-end gap-1">
                      <input type="number" min="0" max="100" step="1" value={rawPct||""}
                        onChange={e => onProgressChange(cat, Math.min(100, Math.max(0, parseInt(e.target.value)||0)))}
                        placeholder="0"
                        className="w-14 px-1.5 py-0.5 text-right border border-gray-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 tabular-nums"/>
                      <span className="text-gray-400 text-xs">%</span>
                    </div>
                  </td>
                  <td className="py-2.5 px-3 text-sm text-right tabular-nums font-medium text-gray-600">{fmtUSD(Math.round(projected))}</td>
                  <td className={`py-2.5 pl-3 pr-4 text-sm text-right font-semibold tabular-nums ${variance < 0 ? "text-red-600" : variance > 0 ? "text-emerald-600" : "text-gray-400"}`}>
                    {budget > 0 || actual > 0 ? (variance >= 0 ? "+" : "") + fmtUSD(Math.round(variance)) : "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </div>
      );
    }

    function TrackerView({ instances, tier, rateOverrides, settings, purchases, onAddPurchase, onDeletePurchase, catProgress, onProgressChange }) {
      const [form, setForm] = useState({ vendor:"", description:"", category: PURCHASE_CATS[0], amount:"", date: new Date().toISOString().split("T")[0], notes:"" });
      const [showForm, setShowForm] = useState(false);

      // All line items with costType
      const allLineItems = useMemo(() => instances.flatMap(inst => {
        const def = DB.assemblies.find(a => a.id === inst.assemblyId); if (!def) return [];
        return computeLineItems(def, inst.inputs, tier, rateOverrides);
      }), [instances, tier, rateOverrides]);

      // Budget by category + costType map
      const { budgetByCat, costTypeByCat } = useMemo(() => {
        const b = {}, ct = {};
        allLineItems.forEach(item => {
          b[item.category] = (b[item.category] || 0) + item.total;
          ct[item.category] = item.costType;
        });
        return { budgetByCat: b, costTypeByCat: ct };
      }, [allLineItems]);

      const budgetTotal = Object.values(budgetByCat).reduce((s, v) => s + v, 0);

      const spentByCat = {};
      purchases.forEach(p => { spentByCat[p.category] = (spentByCat[p.category] || 0) + p.amount; });
      const totalSpent = purchases.reduce((s, p) => s + p.amount, 0);

      // All cats (budget + any actuals with no budget)
      const allCats = Array.from(new Set([...Object.keys(budgetByCat), ...Object.keys(spentByCat)])).sort();

      // Per-category projected cost
      const projectedByCat = {};
      allCats.forEach(cat => {
        const b = budgetByCat[cat] || 0;
        const a = spentByCat[cat] || 0;
        const pctDone = Math.min(100, Math.max(0, catProgress[cat] || 0));
        if (pctDone >= 100) projectedByCat[cat] = a;
        else if (pctDone === 0 || a === 0) projectedByCat[cat] = b;
        else projectedByCat[cat] = a / (pctDone / 100);
      });

      const projectedTotal = Object.values(projectedByCat).reduce((s, v) => s + v, 0);
      const projectedVariance = budgetTotal - projectedTotal;

      // Weighted % complete (budget-weighted)
      const weightedPct = budgetTotal > 0
        ? allCats.reduce((s, cat) => s + (budgetByCat[cat] || 0) * (catProgress[cat] || 0), 0) / budgetTotal
        : 0;

      const spentPct = budgetTotal > 0 ? Math.min(100, (totalSpent / budgetTotal) * 100) : 0;
      const spendBarColor = spentPct < 75 ? "bg-emerald-500" : spentPct < 95 ? "bg-amber-500" : "bg-red-500";

      const laborRows  = allCats.filter(c => (costTypeByCat[c] || "labor") === "labor") .map(cat => ({ cat, budget: budgetByCat[cat] || 0 }));
      const matRows    = allCats.filter(c => (costTypeByCat[c] || "labor") === "material").map(cat => ({ cat, budget: budgetByCat[cat] || 0 }));

      const handleAdd = e => {
        e.preventDefault();
        const amt = parseFloat(form.amount);
        if (!amt || amt <= 0) return;
        onAddPurchase({ id: uid(), vendor: form.vendor, description: form.description, category: form.category, amount: amt, date: form.date, notes: form.notes });
        setForm({ vendor:"", description:"", category: PURCHASE_CATS[0], amount:"", date: new Date().toISOString().split("T")[0], notes:"" });
        setShowForm(false);
      };

      return (
        <div className="flex-1 overflow-y-auto p-5 space-y-5">

          {/* Pacing cards */}
          <div className="grid grid-cols-4 gap-4">
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Budget</p>
              <p className="text-xl font-black text-gray-900 tabular-nums">{fmtUSD(budgetTotal)}</p>
              <p className="text-xs text-gray-400 mt-0.5">{instances.length} assembl{instances.length===1?"y":"ies"}</p>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Spent to Date</p>
              <p className="text-xl font-black text-gray-900 tabular-nums">{fmtUSD(totalSpent)}</p>
              <p className="text-xs text-gray-400 mt-0.5">{purchases.length} purchase{purchases.length===1?"":"s"}</p>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Projected End</p>
              <p className={`text-xl font-black tabular-nums ${projectedTotal > budgetTotal ? "text-red-600" : "text-gray-900"}`}>{fmtUSD(Math.round(projectedTotal))}</p>
              <p className="text-xs text-gray-400 mt-0.5">{weightedPct.toFixed(0)}% complete</p>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Projected Variance</p>
              <p className={`text-xl font-black tabular-nums ${projectedVariance < 0 ? "text-red-600" : "text-emerald-600"}`}>
                {(projectedVariance >= 0 ? "+" : "") + fmtUSD(Math.round(projectedVariance))}
              </p>
              <p className="text-xs text-gray-400 mt-0.5">{projectedVariance >= 0 ? "under budget" : "over budget"}</p>
            </div>
          </div>

          {/* Spend progress bar */}
          <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
            <div className="flex justify-between text-xs text-gray-500 mb-2">
              <span>Spend vs Budget</span>
              <span className="font-semibold tabular-nums">{spentPct.toFixed(1)}% used · {weightedPct.toFixed(0)}% complete</span>
            </div>
            <div className="relative w-full bg-gray-100 rounded-full h-3">
              <div className={`h-3 rounded-full transition-all ${spendBarColor}`} style={{width:`${spentPct}%`}}/>
              {weightedPct > 0 && (
                <div className="absolute top-0 h-3 w-0.5 bg-gray-800 rounded-full" style={{left:`${weightedPct}%`}} title={`${weightedPct.toFixed(0)}% complete`}/>
              )}
            </div>
            <div className="flex justify-between text-[10px] text-gray-400 mt-1">
              <span>Spent {fmtUSD(totalSpent)}</span>
              {weightedPct > 0 && <span>▲ {weightedPct.toFixed(0)}% done</span>}
              <span>Budget {fmtUSD(budgetTotal)}</span>
            </div>
          </div>

          {/* Budget vs Actual table — split Labor / Materials */}
          {allCats.length > 0 && (
            <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
              <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                <p className="text-sm font-bold text-gray-900">Budget vs Actual</p>
                <p className="text-xs text-gray-400">Set % complete per category to project final cost</p>
              </div>
              <table className="w-full">
                <thead><tr className="border-b border-gray-100 bg-gray-50">
                  <th className="py-2 pl-4 pr-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Category</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Budget</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Actual</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">% Done</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Projected</th>
                  <th className="py-2 pl-3 pr-4 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Variance</th>
                </tr></thead>
                <CatTable title="Labor" rows={laborRows} spentByCat={spentByCat} catProgress={catProgress} onProgressChange={onProgressChange}/>
                <CatTable title="Materials &amp; Allowances" rows={matRows} spentByCat={spentByCat} catProgress={catProgress} onProgressChange={onProgressChange}/>
                <tfoot><tr className="border-t-2 border-gray-200 bg-gray-50/80">
                  <td className="py-2.5 pl-4 text-xs font-bold text-gray-700 uppercase tracking-wider">Total</td>
                  <td className="py-2.5 px-3 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(budgetTotal)}</td>
                  <td className="py-2.5 px-3 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(totalSpent)}</td>
                  <td className="py-2.5 px-3 text-xs text-right text-gray-400">{weightedPct.toFixed(0)}%</td>
                  <td className="py-2.5 px-3 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(Math.round(projectedTotal))}</td>
                  <td className={`py-2.5 pl-3 pr-4 text-sm font-black text-right tabular-nums ${projectedVariance < 0 ? "text-red-600" : "text-emerald-600"}`}>
                    {(projectedVariance >= 0 ? "+" : "") + fmtUSD(Math.round(projectedVariance))}
                  </td>
                </tr></tfoot>
              </table>
            </div>
          )}

          {/* Purchase log */}
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
              <p className="text-sm font-bold text-gray-900">Purchase Log</p>
              <button onClick={()=>setShowForm(f=>!f)}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                <IconPlus c="w-3 h-3"/> Log Purchase
              </button>
            </div>
            {showForm && (
              <form onSubmit={handleAdd} className="px-4 py-4 border-b border-gray-100 bg-gray-50 grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Vendor</label>
                  <input type="text" value={form.vendor} onChange={e=>setForm(f=>({...f,vendor:e.target.value}))} placeholder="Home Depot, etc."
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Description</label>
                  <input type="text" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="What was purchased"
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Category</label>
                  <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {PURCHASE_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Amount ($) <span className="text-red-400">*</span></label>
                  <input type="number" step="0.01" min="0" required value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00"
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Date</label>
                  <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Notes</label>
                  <input type="text" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Optional"
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div className="col-span-2 flex gap-2 pt-1">
                  <button type="button" onClick={()=>setShowForm(false)} className="flex-1 px-3 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-white">Cancel</button>
                  <button type="submit" className="flex-1 px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">Add Purchase</button>
                </div>
              </form>
            )}
            {purchases.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-10 text-center px-4">
                <IconTracker c="w-8 h-8 text-gray-200 mb-2"/>
                <p className="text-sm text-gray-400">No purchases logged yet.</p>
                <p className="text-xs text-gray-300 mt-1">Click "Log Purchase" to start tracking actuals.</p>
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead><tr className="border-b border-gray-100 bg-gray-50">
                    <th className="py-2 pl-4 pr-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Date</th>
                    <th className="py-2 px-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Vendor / Description</th>
                    <th className="py-2 px-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Category</th>
                    <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Amount</th>
                    <th className="py-2 pl-3 pr-4 text-[11px] font-semibold text-gray-400 uppercase tracking-wider w-8"></th>
                  </tr></thead>
                  <tbody className="divide-y divide-gray-50">
                    {purchases.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(p=>(
                      <tr key={p.id} className="hover:bg-gray-50/80 group">
                        <td className="py-2 pl-4 pr-3 text-xs text-gray-400 tabular-nums whitespace-nowrap">{p.date}</td>
                        <td className="py-2 px-3 text-sm">
                          <span className="text-gray-800 font-medium">{p.vendor||"—"}</span>
                          {p.description && <span className="block text-xs text-gray-400">{p.description}</span>}
                          {p.notes && <span className="block text-xs text-gray-300 italic">{p.notes}</span>}
                        </td>
                        <td className="py-2 px-3 text-xs text-gray-500">{p.category}</td>
                        <td className="py-2 px-3 text-sm text-right font-semibold text-gray-800 tabular-nums">{fmtUSD2(p.amount)}</td>
                        <td className="py-2 pl-3 pr-4">
                          <button onClick={()=>onDeletePurchase(p.id)} className="opacity-0 group-hover:opacity-100 p-1 text-gray-300 hover:text-red-500 transition-all" title="Delete"><IconTrash c="w-3.5 h-3.5"/></button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot><tr className="border-t-2 border-gray-200 bg-gray-50">
                    <td colSpan={3} className="py-2.5 pl-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Total Spent</td>
                    <td className="py-2.5 px-3 text-sm font-black text-gray-900 text-right tabular-nums">{fmtUSD2(totalSpent)}</td>
                    <td></td>
                  </tr></tfoot>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // =========================================================================
    // MAIN APP
    // =========================================================================
    const DEFAULT_SETTINGS = { projectName:"New Estimate", pricingTier:"mid", salesTaxPct:0, contingencyPct:0.1, overheadPct:0.1, profitPct:0.1 };

    function TradeScope() {
      const saved = load();
      const [settings,    setSettings]    = useState(saved?.settings    ?? {...DEFAULT_SETTINGS});
      const [instances,   setInstances]   = useState(saved?.instances   ?? []);
      const [rateOverrides, setRateOverrides] = useState(saved?.rateOverrides ?? {});
      const [purchases,   setPurchases]   = useState(saved?.purchases   ?? []);
      const [catProgress, setCatProgress] = useState(saved?.catProgress ?? {});
      const [addingDef,   setAddingDef]   = useState(null);
      const [editingPair, setEditingPair] = useState(null);
      const [showSettings,setShowSettings]= useState(false);
      const [editingName, setEditingName] = useState(false);
      const [activeView,  setActiveView]  = useState("estimate"); // "estimate" | "tracker"

      useEffect(() => { save({ settings, instances, rateOverrides, purchases, catProgress }); }, [settings, instances, rateOverrides, purchases, catProgress]);

      const addAssembly = (def, inputs) => { setInstances(p=>[...p,{id:uid(),assemblyId:def.id,inputs}]); setAddingDef(null); };
      const updateAssembly = (id, inputs) => { setInstances(p=>p.map(i=>i.id===id?{...i,inputs}:i)); setEditingPair(null); };
      const removeAssembly = id => setInstances(p=>p.filter(i=>i.id!==id));
      const setOverride = (k,v) => setRateOverrides(p=>({...p,[k]:v}));
      const resetOverride = k => setRateOverrides(p=>{ const n={...p}; delete n[k]; return n; });
      const addPurchase = p => setPurchases(prev=>[...prev,p]);
      const deletePurchase = id => setPurchases(prev=>prev.filter(p=>p.id!==id));
      const tier = settings.pricingTier;

      return (
        <div className="h-screen flex flex-col bg-gray-50 overflow-hidden" style={{fontFamily:"system-ui,-apple-system,sans-serif"}}>
          {/* Header */}
          <header className="bg-gray-900 text-white flex items-center gap-4 px-5 py-2.5 flex-shrink-0 shadow-lg z-10">
            <div className="flex items-center gap-2 flex-shrink-0">
              <IconBuilding c="w-5 h-5 text-blue-400"/>
              <span className="font-black text-base tracking-tight">TradeScope</span>
              <span className="text-gray-600 text-xs">· San Diego, CA</span>
            </div>
            <div className="h-4 w-px bg-gray-700"/>
            {editingName ? (
              <input autoFocus type="text" value={settings.projectName}
                onChange={e=>setSettings(s=>({...s,projectName:e.target.value}))}
                onBlur={()=>setEditingName(false)}
                onKeyDown={e=>{if(e.key==="Enter"||e.key==="Escape")setEditingName(false);}}
                className="bg-gray-800 text-white text-sm px-2 py-1 rounded border border-gray-600 outline-none w-52"/>
            ) : (
              <button onClick={()=>setEditingName(true)} className="flex items-center gap-1.5 text-sm text-gray-300 hover:text-white group">
                <span>{settings.projectName}</span>
                <IconEdit c="w-3 h-3 text-gray-600 group-hover:text-gray-400"/>
              </button>
            )}
            <div className="flex-1"/>

            {/* View toggle */}
            <div className="flex rounded-lg overflow-hidden border border-gray-600">
              <button onClick={()=>setActiveView("estimate")}
                className={`flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-colors ${activeView==="estimate"?"bg-blue-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>
                <IconEstimate c="w-3.5 h-3.5"/> Estimate
              </button>
              <button onClick={()=>setActiveView("tracker")}
                className={`flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-colors ${activeView==="tracker"?"bg-blue-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>
                <IconTracker c="w-3.5 h-3.5"/> Tracker {purchases.length>0&&<span className="bg-blue-500 text-white rounded-full px-1.5 py-0.5 text-[10px] ml-0.5">{purchases.length}</span>}
              </button>
            </div>

            {activeView==="estimate" && <>
              <div className="h-4 w-px bg-gray-700"/>
              {instances.length>0 && <>
                <span className="text-xs text-gray-500 hidden sm:block">{instances.length} assembl{instances.length===1?"y":"ies"}</span>
                <button onClick={()=>{ if(confirm("Clear all assemblies?")){ setInstances([]); setRateOverrides({}); }}} className="text-xs text-gray-500 hover:text-red-400 px-2 py-1 rounded hidden sm:block">Clear</button>
              </>}
              <div className="h-4 w-px bg-gray-700"/>
              <TierSelector tier={tier} onChange={t=>setSettings(s=>({...s,pricingTier:t}))}/>
            </>}
          </header>

          {activeView === "estimate" ? (
            /* 3-column layout */
            <div className="flex flex-1 overflow-hidden">
              <div className="w-48 flex-shrink-0"><AssemblyPalette onAdd={setAddingDef}/></div>
              <div className="flex-1 overflow-y-auto">
                {instances.length===0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-center px-8 pb-16">
                    <div className="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
                      <IconBuilding c="w-8 h-8 text-gray-300"/>
                    </div>
                    <h3 className="text-lg font-bold text-gray-400 mb-1">No assemblies yet</h3>
                    <p className="text-sm text-gray-400 max-w-xs">Select an assembly from the left panel to start building your estimate.</p>
                    <div className="mt-6 flex items-center gap-2 text-xs text-gray-400 bg-gray-100 px-3 py-2 rounded-lg">
                      <IconAlert/> All costs driven by the JSON rate database — no hardcoded values.
                    </div>
                  </div>
                ) : (
                  <div className="p-4 space-y-3 max-w-3xl">
                    {instances.map(inst => {
                      const def = DB.assemblies.find(a=>a.id===inst.assemblyId); if(!def) return null;
                      return <AssemblyCard key={inst.id} instance={inst} asmDef={def} tier={tier} rateOverrides={rateOverrides}
                        onEdit={inst=>setEditingPair({instance:inst,def})} onRemove={removeAssembly}
                        onRateOverride={setOverride} onResetRateOverride={resetOverride}/>;
                    })}
                  </div>
                )}
              </div>
              <div className="w-60 flex-shrink-0">
                <SummaryPanel instances={instances} tier={tier} rateOverrides={rateOverrides} settings={settings} onSettingsOpen={()=>setShowSettings(true)}/>
              </div>
            </div>
          ) : (
            /* Tracker view */
            <div className="flex flex-1 overflow-hidden">
              <TrackerView
                instances={instances} tier={tier} rateOverrides={rateOverrides} settings={settings}
                purchases={purchases} onAddPurchase={addPurchase} onDeletePurchase={deletePurchase}
                catProgress={catProgress} onProgressChange={(cat, pct) => setCatProgress(p => ({...p, [cat]: pct}))}/>
            </div>
          )}

          {addingDef && <AssemblyFormModal asmDef={addingDef} initialInputs={null} onSave={inputs=>addAssembly(addingDef,inputs)} onClose={()=>setAddingDef(null)}/>}
          {editingPair && <AssemblyFormModal asmDef={editingPair.def} initialInputs={editingPair.instance.inputs} onSave={inputs=>updateAssembly(editingPair.instance.id,inputs)} onClose={()=>setEditingPair(null)}/>}
          {showSettings && <SettingsModal settings={settings} onUpdate={setSettings} onClose={()=>setShowSettings(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TradeScope/>);
  </script>
</body>
</html>
