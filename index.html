    // =========================================================================
    // ENGINES
    // =========================================================================
    function evalExpr(expr, ctx) {
      const s = String(expr).trim();
      if (/^-?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
      try {
        const keys = Object.keys(ctx), vals = keys.map(k => ctx[k]);
        const r = new Function(...keys, `return (${s});`)(...vals);
        return isFinite(r) ? Number(r) : 0;
      } catch(e) { return 0; }
    }

    function evalCond(cond, ctx) {
      if (!cond) return true;
      try {
        const keys = Object.keys(ctx), vals = keys.map(k => ctx[k]);
        return Boolean(new Function(...keys, `return (${cond});`)(...vals));
      } catch(e) { return false; }
    }

    function resolveRateKey(liDef, inputs) {
      if (liDef.rateKey) return liDef.rateKey;
      if (liDef.rateSelector) {
        const [ik, map] = Object.entries(liDef.rateSelector)[0];
        return map[inputs[ik]] || null;
      }
      return null;
    }

    function computeLineItems(asmDef, inputs, tier, overrides = {}, costTypeOverrides = {}, globalRateOverrides = {}, materialMode = "estimate") {
      const ctx = { ...inputs };
      if (asmDef.calculations)
        for (const [k, f] of Object.entries(asmDef.calculations)) ctx[k] = evalExpr(f, ctx);

      const items = asmDef.lineItems.flatMap((liDef, i) => {
        if (liDef.condition && !evalCond(liDef.condition, ctx)) return [];
        const qty = evalExpr(liDef.quantityFormula, ctx);
        if (qty <= 0) return [];

        let rateKey, label, unit, category, baseUnitCost;
        if (liDef.rateKey || liDef.rateSelector) {
          rateKey = resolveRateKey(liDef, inputs);
          const r = DB.rates[rateKey]; if (!r) return [];
          const gro = (globalRateOverrides && globalRateOverrides[rateKey]) || {};
          label = gro.label ?? r.label; unit = r.unit; category = r.category;
          baseUnitCost = gro[tier] !== undefined ? gro[tier] : r[tier];
        } else if (liDef.customItem) {
          rateKey = `__c_${asmDef.id}_${i}`;
          ({ label, unit, category } = liDef.customItem);
          baseUnitCost = evalExpr(liDef.unitCostFormula, ctx);
        } else return [];

        const unitCost = overrides[rateKey] !== undefined ? overrides[rateKey] : baseUnitCost;
        const q = Math.round(qty * 100) / 100;
        // costType: user override > lineItem-level flag > auto-detect
        const costType = costTypeOverrides[rateKey] ?? liDef.costType ?? (liDef.customItem ? "material" : "labor");
        return [{ id: `${asmDef.id}_${i}`, rateKey, label, unit, category, qty: q, unitCost, baseUnitCost, total: Math.round(q * unitCost * 100) / 100, isOverridden: overrides[rateKey] !== undefined, isCustom: !!liDef.customItem, costType }];
      });
      // When material is sourced from procurement, strip material line items
      return materialMode === "procurement" ? items.filter(li => li.costType !== "material") : items;
    }

    // =========================================================================
    // STORAGE
    // =========================================================================
    // Legacy single-project key (v2) — used only for one-time migration
    const SK_V2 = "tradescope_v2";
    // Multi-project key (v3)
    const SK_V3 = "tradescope_v3";
    const DEFAULT_CONFIG = { customAssemblies: [], asmOverrides: {}, masterGroups: null, globalRateOverrides: {} };

    // Normalize a customCategory entry — older saves stored plain strings; new format is { name, costType }
    const normCat = c => (typeof c === "string") ? { name: c, costType: "labor" } : c;
    // Normalize procurement item to new schema (estimatedAmount + actualAmount)
    const normProc = p => {
      if (p.estimatedAmount !== undefined) return p; // already new format
      return {
        ...p,
        estimatedAmount: String(p.amount || ""),
        actualAmount:    p.purchased ? String(p.amount || "") : "",
        amount: undefined, // drop old field
      };
    };

    const loadAppData = () => {
      try {
        const r = localStorage.getItem(SK_V3);
        if (r) {
          const d = JSON.parse(r);
          if (!d.config) d.config = {...DEFAULT_CONFIG};
          if (!d.config.asmOverrides) d.config.asmOverrides = {};
          if (!d.config.globalRateOverrides) d.config.globalRateOverrides = {};
          if (d.config.masterGroups === undefined) d.config.masterGroups = null;
          // Migrate legacy customCategories (no longer used, discard)

    const GROUPS = ["Structural","Finishes","Demo","Ceilings","MEP","Specialties","Allowances"];

    // All categories (labor + material)

    // Material-only categories (from DB assemblies with customItem lineItems)

    // Returns all purchase categories (for Tracker + general dropdowns)
    const getPurchaseCats = (extras = [], customAsms = []) => {
      const all = new Set(_BASE_CATS);

    // Returns material-only categories (for Procurement dropdown)

      (procurement || []).filter(p => p.category && parseFloat(p.estimatedAmount) > 0).map(p => ({

    const applyAsmOverrides = (def, asmOverrides = {}) => {

    function LineItemRow({ item, onOverride, onReset, onCostTypeChange }) {

      const startEdit = () => { setEditVal(item.unitCost.toFixed(2)); setEditing(true); };

      return (
        <tr className={`group transition-colors ${item.isOverridden?"bg-amber-50/60":"hover:bg-gray-50/80"}`}>
          <td className="py-2 pl-5 pr-3 text-sm">

              <span className={item.isOverridden?"text-amber-600 font-medium":"text-gray-600"}>{fmtUSD2(item.unitCost)}</span>

              </div>
            </>)}

          <td className="py-2 pl-3 pr-5 text-sm text-right font-semibold text-gray-800 tabular-nums">{fmtUSD(item.total)}</td>
        </tr>
      );

    function SummaryPanel({ instances, tier, rateOverrides, costTypeOverrides, globalRateOverrides, settings, onSettingsOpen, customAssemblies, procurement, asmOverrides }) {
      const allItems = useMemo(() => {
        const asmItems = instances.flatMap(inst => {
          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if(!def) return [];
          return computeLineItems(def, inst.inputs, tier, rateOverrides, costTypeOverrides, globalRateOverrides, inst.materialMode);
        });
        return [...asmItems, ...getProcurementLineItems(procurement)];
      }, [instances, tier, rateOverrides, costTypeOverrides, globalRateOverrides, customAssemblies, asmOverrides, procurement]);

      const direct = allItems.reduce((s,i)=>s+i.total, 0);
      const contingency = direct * settings.contingencyPct;
      const base = direct + contingency;
      const overhead = base * settings.overheadPct;
      const profit = base * settings.profitPct;
      const tax = direct * settings.salesTaxPct;
      const total = base + overhead + profit + tax;
      const margin = total > 0 ? ((total-direct)/total*100).toFixed(1) : 0;

      const byCategory = {};
      allItems.forEach(i => { byCategory[i.category]=(byCategory[i.category]||0)+i.total; });
      const cats = Object.entries(byCategory).sort(([,a],[,b])=>b-a);

      const tierBadge = { low:"bg-emerald-100 text-emerald-700 border-emerald-200", mid:"bg-blue-100 text-blue-700 border-blue-200", high:"bg-amber-100 text-amber-700 border-amber-200" };

      return (
        <div className="h-full bg-white border-l border-gray-200 flex flex-col overflow-hidden">

            </div>
            <button onClick={onSettingsOpen} className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg" title="Settings"><IconSettings /></button>
          </div>
          <div className="flex-1 overflow-y-auto">
            {direct===0 ? (
              <div className="flex flex-col items-center justify-center h-40 text-center px-4">
                <IconBuilding c="w-8 h-8 text-gray-200 mx-auto mb-2"/>
                <p className="text-xs text-gray-400">Add assemblies to see cost summary</p>
              </div>
            ) : (<>
              <div className="px-4 py-4 border-b border-gray-100">
                <p className="text-[10px] font-semibold uppercase tracking-widest text-gray-400 mb-3">Breakdown</p>
                <div className="space-y-2.5">
                  <SRow label="Direct Costs" value={fmtUSD(direct)} bold/>
                  <SRow label={`Contingency (${fmtPct(settings.contingencyPct)})`} value={`+ ${fmtUSD(contingency)}`} sub/>
                  <div className="border-t border-gray-100 pt-2.5"><SRow label="Cost w/ Contingency" value={fmtUSD(base)} bold/></div>
                  <SRow label={`Overhead (${fmtPct(settings.overheadPct)})`} value={`+ ${fmtUSD(overhead)}`} sub/>
                  <SRow label={`Profit (${fmtPct(settings.profitPct)})`} value={`+ ${fmtUSD(profit)}`} sub/>
                  {settings.salesTaxPct>0 && <SRow label={`Tax (${fmtPct(settings.salesTaxPct)})`} value={`+ ${fmtUSD(tax)}`} sub/>}
                </div>
                <div className="mt-4 pt-3 border-t-2 border-gray-900">
                  <div className="flex items-baseline justify-between">
                    <span className="font-bold text-gray-900 text-sm">Total Sell Price</span>

                  </div>
                  <div className="flex justify-between mt-1 text-xs text-gray-400">

                <div className="px-4 py-4">

                    {cats.map(([cat,amt]) => (
                      <div key={cat}>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="text-gray-600 font-medium truncate">{cat}</span>

                </div>

    // =========================================================================
    // TRACKER MODULE
    // =========================================================================
    function CatTable({ title, rows, spentByCat, catProgress, onProgressChange }) {
      if (rows.length === 0) return null;
      return (
        <tbody>
          <tr className="bg-gray-100 border-y border-gray-200">
            <td colSpan={6} className="px-4 py-2">
              <p className="text-[11px] font-bold uppercase tracking-widest text-gray-500">{title}</p>
            </td>
          </tr>
          {rows.map(({ cat, budget }) => {
            const actual = spentByCat[cat] || 0;
            const rawPct = catProgress[cat] !== undefined ? catProgress[cat] : 0;
            const pctDone = Math.min(100, Math.max(0, rawPct));
            let projected;
            if (pctDone >= 100) projected = actual;
            else if (pctDone === 0 || actual === 0) projected = budget;
            else projected = actual / (pctDone / 100);
            const variance = budget - projected;
            return (
              <tr key={cat} className="hover:bg-gray-50/60 group border-b border-gray-50">
                <td className="py-2.5 pl-4 pr-3 text-sm text-gray-700 font-medium">{cat}</td>
                <td className="py-2.5 px-3 text-sm text-right text-gray-500 tabular-nums">{budget > 0 ? fmtUSD(budget) : "—"}</td>
                <td className="py-2.5 px-3 text-sm text-right text-gray-500 tabular-nums">{actual > 0 ? fmtUSD(actual) : "—"}</td>
                <td className="py-2.5 px-3">
                  <div className="flex items-center justify-end gap-1">
                    <input type="number" min="0" max="100" step="1" value={rawPct||""}
                      onChange={e => onProgressChange(cat, Math.min(100, Math.max(0, parseInt(e.target.value)||0)))}
                      placeholder="0"
                      className="w-14 px-1.5 py-0.5 text-right border border-gray-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 tabular-nums"/>
                    <span className="text-gray-400 text-xs">%</span>
                  </div>
                </td>
                <td className="py-2.5 px-3 text-sm text-right tabular-nums font-medium text-gray-600">{fmtUSD(Math.round(projected))}</td>
                <td className={`py-2.5 pl-3 pr-4 text-sm text-right font-semibold tabular-nums ${variance < 0 ? "text-red-600" : variance > 0 ? "text-emerald-600" : "text-gray-400"}`}>
                  {budget > 0 || actual > 0 ? (variance >= 0 ? "+" : "") + fmtUSD(Math.round(variance)) : "—"}
                </td>
                </tr>
              );
            })}
        </tbody>
      );
    }

    function TrackerView({ instances, tier, rateOverrides, costTypeOverrides, globalRateOverrides, settings, purchases, onAddPurchase, onDeletePurchase, catProgress, onProgressChange, customAssemblies, procurement, asmOverrides }) {
      // Assembly names from the current estimate (for purchase category dropdown)
      const asmCats = useMemo(() => getAsmNamesFromEstimate(instances, customAssemblies, asmOverrides), [instances, customAssemblies, asmOverrides]);
      const [form, setForm] = useState({ vendor:"", description:"", category: "", amount:"", date: new Date().toISOString().split("T")[0], notes:"" });
      const [showForm, setShowForm] = useState(false);
      const [purchaseFilter, setPurchaseFilter] = useState("all"); // "all"|"labor"|"material"

      // Budget by sub-assembly name + costType map
      const { budgetByAsm, costTypeByAsm } = useMemo(() => {
        const b = {}, ct = {};
        // Assembly instances → keyed by assembly name
        instances.forEach(inst => {
          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if (!def) return;
          const items = computeLineItems(def, inst.inputs, tier, rateOverrides, costTypeOverrides, globalRateOverrides, inst.materialMode);
          const total = items.reduce((s, i) => s + i.total, 0);
          b[def.name] = (b[def.name] || 0) + total;
          // labor if ANY item is labor, otherwise material
          const hasLabor = items.some(i => i.costType === "labor");
          if (ct[def.name] === undefined) ct[def.name] = hasLabor ? "labor" : "material";
          else if (hasLabor) ct[def.name] = "labor";
        });
        // Procurement items (always material), keyed by sub-assembly category name
        getProcurementLineItems(procurement).forEach(item => {
          b[item.category] = (b[item.category] || 0) + item.total;
          ct[item.category] = "material";
        });
        return { budgetByAsm: b, costTypeByAsm: ct };
      }, [instances, tier, rateOverrides, costTypeOverrides, globalRateOverrides, customAssemblies, asmOverrides, procurement]);

      const budgetTotal = Object.values(budgetByAsm).reduce((s, v) => s + v, 0);

      const spentByAsm = {};
      purchases.forEach(p => { spentByAsm[p.category] = (spentByAsm[p.category] || 0) + p.amount; });
      const totalSpent = purchases.reduce((s, p) => s + p.amount, 0);

      // All assembly names (budgeted + any actuals not in budget)
      const allAsms = Array.from(new Set([...Object.keys(budgetByAsm), ...Object.keys(spentByAsm)])).sort();

      // Per-assembly projected cost
      const projectedByAsm = {};
      allAsms.forEach(asm => {
        const b = budgetByAsm[asm] || 0;
        const a = spentByAsm[asm] || 0;
        const pctDone = Math.min(100, Math.max(0, catProgress[asm] || 0));
        if (pctDone >= 100) projectedByAsm[asm] = a;
        else if (pctDone === 0 || a === 0) projectedByAsm[asm] = b;
        else projectedByAsm[asm] = a / (pctDone / 100);
      });

      const projectedTotal = Object.values(projectedByAsm).reduce((s, v) => s + v, 0);
      const projectedVariance = budgetTotal - projectedTotal;

      // Weighted % complete (budget-weighted by assembly)
      const weightedPct = budgetTotal > 0
        ? allAsms.reduce((s, asm) => s + (budgetByAsm[asm] || 0) * (catProgress[asm] || 0), 0) / budgetTotal
        : 0;

      const spentPct = budgetTotal > 0 ? Math.min(100, (totalSpent / budgetTotal) * 100) : 0;
      const spendBarColor = spentPct < 75 ? "bg-emerald-500" : spentPct < 95 ? "bg-amber-500" : "bg-red-500";

      const laborRows = allAsms.filter(a => (costTypeByAsm[a] || "labor") === "labor").map(asm => ({ cat: asm, budget: budgetByAsm[asm] || 0 }));
      const matRows   = allAsms.filter(a => (costTypeByAsm[a] || "labor") === "material").map(asm => ({ cat: asm, budget: budgetByAsm[asm] || 0 }));

      const handleAdd = e => {
        e.preventDefault();
        const amt = parseFloat(form.amount);
        if (!amt || amt <= 0) return;
        const cat = form.category || asmCats[0] || "Other";
        onAddPurchase({ id: uid(), vendor: form.vendor, description: form.description, category: cat, amount: amt, date: form.date, notes: form.notes });
        setForm({ vendor:"", description:"", category: "", amount:"", date: new Date().toISOString().split("T")[0], notes:"" });
        setShowForm(false);
      };

      return (
        <div className="flex-1 overflow-y-auto p-5 space-y-5">

          {/* Pacing cards */}
          <div className="grid grid-cols-4 gap-4">
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Budget</p>
              <p className="text-xl font-black text-gray-900 tabular-nums">{fmtUSD(budgetTotal)}</p>
              <p className="text-xs text-gray-400 mt-0.5">{instances.length} assembl{instances.length===1?"y":"ies"}</p>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Spent to Date</p>
              <p className="text-xl font-black text-gray-900 tabular-nums">{fmtUSD(totalSpent)}</p>
              <p className="text-xs text-gray-400 mt-0.5">{purchases.length} purchase{purchases.length===1?"":"s"}</p>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Projected End</p>
              <p className={`text-xl font-black tabular-nums ${projectedTotal > budgetTotal ? "text-red-600" : "text-gray-900"}`}>{fmtUSD(Math.round(projectedTotal))}</p>
              <p className="text-xs text-gray-400 mt-0.5">{weightedPct.toFixed(0)}% complete</p>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
              <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-1">Projected Variance</p>
              <p className={`text-xl font-black tabular-nums ${projectedVariance < 0 ? "text-red-600" : "text-emerald-600"}`}>
                {(projectedVariance >= 0 ? "+" : "") + fmtUSD(Math.round(projectedVariance))}
              </p>
              <p className="text-xs text-gray-400 mt-0.5">{projectedVariance >= 0 ? "under budget" : "over budget"}</p>
            </div>
          </div>

          {/* Spend progress bar */}
          <div className="bg-white rounded-xl border border-gray-200 px-4 py-3">
            <div className="flex justify-between text-xs text-gray-500 mb-2">
              <span>Spend vs Budget</span>
              <span className="font-semibold tabular-nums">{spentPct.toFixed(1)}% used · {weightedPct.toFixed(0)}% complete</span>
            </div>
            <div className="relative w-full bg-gray-100 rounded-full h-3">
              <div className={`h-3 rounded-full transition-all ${spendBarColor}`} style={{width:`${spentPct}%`}}/>
              {weightedPct > 0 && (
                <div className="absolute top-0 h-3 w-0.5 bg-gray-800 rounded-full" style={{left:`${weightedPct}%`}} title={`${weightedPct.toFixed(0)}% complete`}/>
              )}
            </div>
            <div className="flex justify-between text-[10px] text-gray-400 mt-1">
              <span>Spent {fmtUSD(totalSpent)}</span>
              {weightedPct > 0 && <span>▲ {weightedPct.toFixed(0)}% done</span>}
              <span>Budget {fmtUSD(budgetTotal)}</span>
            </div>
          </div>

          {/* Budget vs Actual table — split Labor / Materials, rows = sub-assembly names */}
          {allAsms.length > 0 && (
            <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
              <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                <p className="text-sm font-bold text-gray-900">Budget vs Actual</p>
                <p className="text-xs text-gray-400">Set % complete per sub-assembly to project final cost</p>
              </div>
              <table className="w-full">
                <thead><tr className="border-b border-gray-100 bg-gray-50">
                  <th className="py-2 pl-4 pr-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Sub-Assembly</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Budget</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Actual</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">% Done</th>
                  <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Projected</th>
                  <th className="py-2 pl-3 pr-4 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Variance</th>
                </tr></thead>
                <CatTable title="Labor" rows={laborRows} spentByCat={spentByAsm} catProgress={catProgress} onProgressChange={onProgressChange}/>
                <CatTable title="Materials &amp; Allowances" rows={matRows} spentByCat={spentByAsm} catProgress={catProgress} onProgressChange={onProgressChange}/>
                <tfoot><tr className="border-t-2 border-gray-200 bg-gray-50/80">
                  <td className="py-2.5 pl-4 text-xs font-bold text-gray-700 uppercase tracking-wider">Total</td>
                  <td className="py-2.5 px-3 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(budgetTotal)}</td>
                  <td className="py-2.5 px-3 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(totalSpent)}</td>
                  <td className="py-2.5 px-3 text-xs text-right text-gray-400">{weightedPct.toFixed(0)}%</td>
                  <td className="py-2.5 px-3 text-sm font-bold text-gray-900 text-right tabular-nums">{fmtUSD(Math.round(projectedTotal))}</td>
                  <td className={`py-2.5 pl-3 pr-4 text-sm font-black text-right tabular-nums ${projectedVariance < 0 ? "text-red-600" : "text-emerald-600"}`}>
                    {(projectedVariance >= 0 ? "+" : "") + fmtUSD(Math.round(projectedVariance))}
                  </td>
                </tr></tfoot>
              </table>
            </div>
          )}

          {/* Purchase log */}
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between gap-3">
              <p className="text-sm font-bold text-gray-900">Purchase Log</p>
              {/* L/M filter */}
              <div className="flex rounded-lg overflow-hidden border border-gray-200 text-[10px] font-bold">
                {[["all","All"],["labor","L — Labor"],["material","M — Material"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setPurchaseFilter(k)}
                    className={`px-2.5 py-1 transition-colors ${purchaseFilter===k ? "bg-blue-600 text-white" : "bg-white text-gray-500 hover:bg-gray-50"}`}>{l}</button>
                ))}
              </div>
              <button onClick={()=>setShowForm(f=>!f)}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                <IconPlus c="w-3 h-3"/> Log Purchase
              </button>
            </div>
            {showForm && (
              <form onSubmit={handleAdd} className="px-4 py-4 border-b border-gray-100 bg-gray-50 grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Vendor</label>
                  <input type="text" value={form.vendor} onChange={e=>setForm(f=>({...f,vendor:e.target.value}))} placeholder="Home Depot, etc."
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Description</label>
                  <input type="text" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="What was purchased"
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Assembly / Sub-Assembly</label>
                  <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">— Select Assembly —</option>
                    {asmCats.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Amount ($) <span className="text-red-400">*</span></label>
                  <input type="number" step="0.01" min="0" required value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00"
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Date</label>
                  <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Notes</label>
                  <input type="text" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Optional"
                    className="w-full px-2.5 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div className="col-span-2 flex gap-2 pt-1">
                  <button type="button" onClick={()=>setShowForm(false)} className="flex-1 px-3 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-white">Cancel</button>
                  <button type="submit" className="flex-1 px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">Add Purchase</button>
                </div>
              </form>
            )}
            {purchases.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-10 text-center px-4">
                <IconTracker c="w-8 h-8 text-gray-200 mb-2"/>
                <p className="text-sm text-gray-400">No purchases logged yet.</p>
                <p className="text-xs text-gray-300 mt-1">Click "Log Purchase" to start tracking actuals.</p>
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead><tr className="border-b border-gray-100 bg-gray-50">
                    <th className="py-2 pl-4 pr-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Date</th>
                    <th className="py-2 px-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Vendor / Description</th>
                    <th className="py-2 px-3 text-left text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Category</th>
                    <th className="py-2 px-3 text-right text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Amount</th>
                    <th className="py-2 pl-3 pr-4 text-[11px] font-semibold text-gray-400 uppercase tracking-wider w-8"></th>
                  </tr></thead>
                  <tbody className="divide-y divide-gray-50">
                    {purchases.slice().sort((a,b)=>b.date.localeCompare(a.date)).filter(p => {
                      if (purchaseFilter === "all") return true;
                      const ct = costTypeByAsm[p.category] || "labor";
                      return ct === purchaseFilter;
                    }).map(p=>(
                      <tr key={p.id} className="hover:bg-gray-50/80 group">
                        <td className="py-2 pl-4 pr-3 text-xs text-gray-400 tabular-nums whitespace-nowrap">{p.date}</td>
                        <td className="py-2 px-3 text-sm">
                          <span className="text-gray-800 font-medium">{p.vendor||"—"}</span>
                          {p.description && <span className="block text-xs text-gray-400">{p.description}</span>}
                          {p.notes && <span className="block text-xs text-gray-300 italic">{p.notes}</span>}
                        </td>
                        <td className="py-2 px-3 text-xs text-gray-500">{p.category}</td>
                        <td className="py-2 px-3 text-sm text-right font-semibold text-gray-800 tabular-nums">{fmtUSD2(p.amount)}</td>
                        <td className="py-2 pl-3 pr-4">
                          <button onClick={()=>onDeletePurchase(p.id)} className="opacity-0 group-hover:opacity-100 p-1 text-gray-300 hover:text-red-500 transition-all" title="Delete"><IconTrash c="w-3.5 h-3.5"/></button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot><tr className="border-t-2 border-gray-200 bg-gray-50">
                    <td colSpan={3} className="py-2.5 pl-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Total Spent</td>
                    <td className="py-2.5 px-3 text-sm font-black text-gray-900 text-right tabular-nums">{fmtUSD2(totalSpent)}</td>
                    <td></td>
                  </tr></tfoot>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // =========================================================================
    // PLAN MODULE (GANTT)
    // =========================================================================
    const PLAN_COLORS = ["#3b82f6","#8b5cf6","#10b981","#f59e0b","#f43f5e","#06b6d4","#f97316","#ec4899"];
    const PLAN_LEFT_W = 420;
    const TASK_STATUS_CFG = {
      not_started: { label:"Not Started", bg:"#f3f4f6", color:"#6b7280", bar:"#d1d5db" },
      in_progress:  { label:"In Progress", bg:"#dbeafe", color:"#1d4ed8", bar:"#3b82f6" },
      done:         { label:"Done",         bg:"#d1fae5", color:"#065f46", bar:"#10b981" },
    };

    function PlanView({ planData, onPlanChange }) {
      const { projects, tasks } = planData;
      const [showAddProj, setShowAddProj] = useState(false);
      const [newProjName, setNewProjName] = useState("");
      const [addingTaskFor, setAddingTaskFor] = useState(null);
      const [newTaskName, setNewTaskName] = useState("");
      const [collapsed, setCollapsed] = useState({});
      // dragLive: live override while dragging — avoids writing planData/localStorage on every mousemove
      const [dragLive, setDragLive] = useState(null); // {taskId, startDate?, durationDays?}

      // Refs so document handlers always have fresh data without re-registering
      const draggingRef = React.useRef(null);
      const dragLiveRef = React.useRef(null);
      const planDataRef = React.useRef(planData);
      const onPlanChangeRef = React.useRef(onPlanChange);
      React.useEffect(() => { planDataRef.current = planData; }, [planData]);
      React.useEffect(() => { onPlanChangeRef.current = onPlanChange; }, [onPlanChange]);
      React.useEffect(() => { dragLiveRef.current = dragLive; }, [dragLive]);

      const today = new Date(); today.setHours(0,0,0,0);
      const todayStr = today.toISOString().split("T")[0];

      const DAY_W = 26; // px per day column
      const ROW_H = 36;
      const HDR_H = 36;

      // Build day array covering all tasks + padding
      const { days, minDate } = useMemo(() => {
        let min = new Date(today); min.setDate(min.getDate() - 4);
        let max = new Date(today); max.setDate(max.getDate() + 32);
        tasks.forEach(t => {
          if (!t.startDate) return;
          const s = new Date(t.startDate + "T00:00:00");
          const e = new Date(s); e.setDate(e.getDate() + Math.max(1, t.durationDays||1));
          if (s < min) min = new Date(s);
          if (e > max) max = new Date(e);
        });
        min.setDate(min.getDate() - 2);
        max.setDate(max.getDate() + 6);
        const arr = [];
        const cur = new Date(min);
        while (cur <= max) { arr.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
        return { days: arr, minDate: min };
      }, [tasks.map(t=>t.startDate+":"+t.durationDays).join("|")]);

      const totalW = days.length * DAY_W;
      const isWeekend = (d) => d.getDay() === 0 || d.getDay() === 6;
      const dayIdx = (dateStr) => {
        if (!dateStr) return 0;
        const d = new Date(dateStr + "T00:00:00");
        return Math.round((d - minDate) / 86400000);
      };
      const todayIdx = Math.round((today - minDate) / 86400000);

      const upTask = (id, ch) => onPlanChange({ ...planData, tasks: tasks.map(t => t.id===id ? {...t,...ch} : t) });
      const delTask = (id) => onPlanChange({ ...planData, tasks: tasks.filter(t => t.id!==id) });
      const delProj = (id) => onPlanChange({ projects: projects.filter(p=>p.id!==id), tasks: tasks.filter(t=>t.projectId!==id) });

      const doAddProj = () => {
        if (!newProjName.trim()) return;
        onPlanChange({ ...planData, projects: [...projects, {id:uid(), name:newProjName.trim()}] });
        setNewProjName(""); setShowAddProj(false);
      };
      const doAddTask = (pid) => {
        if (!newTaskName.trim()) return;
        onPlanChange({ ...planData, tasks: [...tasks, {id:uid(), projectId:pid, name:newTaskName.trim(), startDate:todayStr, durationDays:7, status:"not_started"}] });
        setNewTaskName(""); setAddingTaskFor(null);
      };

      // ── Drag / resize ──────────────────────────────────────────────────────
      // Register document-level handlers once; read state via refs to avoid stale closures
      React.useEffect(() => {
        const idxToDate = (idx, capturedMin) => {
          const d = new Date(capturedMin);
          d.setDate(d.getDate() + idx);
          return d.toISOString().split("T")[0];
        };

        const onMove = (e) => {
          const drag = draggingRef.current;
          if (!drag) return;
          const deltaPx = e.clientX - drag.startX;
          const deltaDays = Math.round(deltaPx / DAY_W);
          if (drag.type === "move") {
            const newIdx = drag.origStartIdx + deltaDays;
            const newDate = idxToDate(newIdx, drag.capturedMin);
            setDragLive({ taskId: drag.taskId, startDate: newDate });
          } else {
            const newDur = Math.max(1, drag.origDur + deltaDays);
            setDragLive({ taskId: drag.taskId, durationDays: newDur });
          }
        };

        const onUp = () => {
          const drag = draggingRef.current;
          const live = dragLiveRef.current;
          if (drag && live) {
            const pd = planDataRef.current;
            onPlanChangeRef.current({
              ...pd,
              tasks: pd.tasks.map(t => t.id === drag.taskId ? {...t, ...live} : t)
            });
          }
          draggingRef.current = null;
          setDragLive(null);
        };

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
        return () => {
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        };
      }, []); // register once

      const startDrag = (e, task, type, capturedMinDate) => {
        e.preventDefault();
        e.stopPropagation();
        const startIdx = Math.round((new Date(task.startDate + "T00:00:00") - capturedMinDate) / 86400000);
        draggingRef.current = {
          taskId: task.id,
          type,
          startX: e.clientX,
          origStartIdx: startIdx,
          origDur: Math.max(1, task.durationDays || 1),
          capturedMin: new Date(capturedMinDate),
        };
        setDragLive(type === "move"
          ? { taskId: task.id, startDate: task.startDate }
          : { taskId: task.id, durationDays: Math.max(1, task.durationDays || 1) }
        );
      };
      // ───────────────────────────────────────────────────────────────────────

      // Shared day-column background renderer (weekend shading + grid lines + today marker)
      const DayBg = ({ h }) => (
        <>
          {days.map((d,i) => isWeekend(d) && (
            <div key={i} className="absolute top-0 bottom-0 pointer-events-none" style={{left:i*DAY_W, width:DAY_W, background:"rgba(0,0,0,0.035)"}}/>
          ))}
          {days.map((d,i) => (
            <div key={"g"+i} className="absolute top-0 bottom-0 pointer-events-none border-r border-gray-200" style={{left:(i+1)*DAY_W-1, width:1}}/>
          ))}
          {todayIdx >= 0 && todayIdx < days.length && (
            <div className="absolute top-0 bottom-0 pointer-events-none" style={{left:todayIdx*DAY_W, width:DAY_W, background:"rgba(239,68,68,0.08)"}}/>
          )}
          {todayIdx >= 0 && todayIdx < days.length && (
            <div className="absolute top-0 bottom-0 w-0.5 pointer-events-none bg-red-400" style={{left:todayIdx*DAY_W+DAY_W/2-1, opacity:0.5}}/>
          )}
        </>
      );

      return (
        <div className="flex-1 flex flex-col overflow-hidden" style={{background:"#f9fafb"}}>

          {/* Add project bar */}
          {showAddProj && (
            <div className="flex-shrink-0 flex items-center gap-2 px-4 py-2 bg-blue-50 border-b border-blue-200 z-40">
              <input autoFocus type="text" value={newProjName} placeholder="Project name…"
                onChange={e=>setNewProjName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")doAddProj();if(e.key==="Escape"){setShowAddProj(false);setNewProjName("");}}}
                className="max-w-xs px-2.5 py-1.5 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
              <button onClick={doAddProj} className="px-3 py-1.5 text-xs font-semibold bg-blue-600 text-white rounded-lg hover:bg-blue-700">Add</button>
              <button onClick={()=>{setShowAddProj(false);setNewProjName("");}} className="text-xs text-gray-500 hover:text-gray-700">Cancel</button>
            </div>
          )}

          {/* Main scroll container — single overflow:auto for both axes */}
          <div className="flex-1 overflow-auto" style={{overflowX:"auto", overflowY:"auto"}}>
            <div style={{minWidth: PLAN_LEFT_W + totalW}}>

              {/* STICKY HEADER ROW */}
              <div className="flex border-b border-gray-300 bg-white" style={{position:"sticky", top:0, zIndex:25, height:HDR_H}}>
                {/* Left corner — sticky left */}
                <div className="flex items-center justify-between px-4 border-r border-gray-200 bg-gray-50 flex-shrink-0"
                  style={{width:PLAN_LEFT_W, position:"sticky", left:0, zIndex:26}}>
                  <span className="text-[11px] font-bold uppercase tracking-widest text-gray-400">Plan</span>
                  <button onClick={()=>setShowAddProj(true)} className="flex items-center gap-1 text-xs font-semibold text-blue-600 hover:text-blue-800">
                    <IconPlus c="w-3 h-3"/> Project
                  </button>
                </div>
                {/* Day header labels */}
                <div className="relative flex-shrink-0 bg-white overflow-hidden" style={{width:totalW, height:HDR_H}}>
                  {days.map((d,i) => {
                    const wknd = isWeekend(d);
                    const isTdy = i === todayIdx;
                    // Only show label every 1 day but only if DAY_W is wide enough; skip alternate if needed
                    return (
                      <div key={i} className="absolute top-0 bottom-0 flex items-center justify-center border-r border-gray-200"
                        style={{
                          left: i*DAY_W, width: DAY_W,
                          background: isTdy ? "rgba(239,68,68,0.1)" : wknd ? "rgba(0,0,0,0.035)" : "white",
                          fontSize:9, fontWeight: isTdy ? 700 : 500,
                          color: isTdy ? "#dc2626" : wknd ? "#9ca3af" : "#6b7280",
                          overflow:"hidden"
                        }}>
                        {`${d.getMonth()+1}/${d.getDate()}`}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* CONTENT ROWS */}
              {projects.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-24 text-center px-8">
                  <h3 className="text-lg font-bold text-gray-400 mb-1">No projects yet</h3>
                  <p className="text-sm text-gray-400">Click "+ Project" above to get started.</p>
                </div>
              ) : projects.map((proj, pi) => {
                const color = PLAN_COLORS[pi % PLAN_COLORS.length];
                const projTasks = tasks.filter(t => t.projectId === proj.id)
                  .sort((a,b) => (a.startDate||"9999") < (b.startDate||"9999") ? -1 : 1);
                const isCol = !!collapsed[proj.id];

                // Summary bar extents when collapsed
                let sumStart = null, sumEnd = null;
                if (isCol) {
                  projTasks.forEach(t => {
                    if (!t.startDate) return;
                    const s = dayIdx(t.startDate);
                    const e = s + Math.max(1, t.durationDays||1);
                    if (sumStart===null||s<sumStart) sumStart=s;
                    if (sumEnd===null||e>sumEnd) sumEnd=e;
                  });
                }

                return (
                  <div key={proj.id}>
                    {/* PROJECT HEADER ROW */}
                    <div className="flex border-b border-gray-200 bg-gray-50" style={{height:ROW_H}}>
                      <div className="flex items-center gap-1.5 px-2 border-r border-gray-200 flex-shrink-0 bg-gray-50"
                        style={{width:PLAN_LEFT_W, position:"sticky", left:0, zIndex:10}}>
                        <button onClick={()=>setCollapsed(c=>({...c,[proj.id]:!c[proj.id]}))}
                          className="p-0.5 text-gray-400 hover:text-gray-700 flex-shrink-0 transition-transform"
                          style={{transform: isCol ? "rotate(-90deg)" : "rotate(0deg)"}}>
                          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7"/>
                          </svg>
                        </button>
                        <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:color}}/>
                        <span className="font-bold text-gray-800 text-sm flex-1 truncate">{proj.name}</span>
                        <span className="text-[10px] text-gray-400 flex-shrink-0">{projTasks.length}t</span>
                        <button onClick={()=>setAddingTaskFor(proj.id)} className="p-1 text-gray-400 hover:text-blue-500 rounded flex-shrink-0"><IconPlus c="w-3 h-3"/></button>
                        <button onClick={()=>delProj(proj.id)} className="p-1 text-gray-400 hover:text-red-500 rounded flex-shrink-0"><IconTrash c="w-3 h-3"/></button>
                      </div>
                      {/* Project gantt area */}
                      <div className="relative flex-shrink-0 overflow-hidden" style={{width:totalW, background:color+"0d"}}>
                        <DayBg h={ROW_H}/>
                        {isCol && sumStart !== null && (
                          <div className="absolute rounded flex items-center px-1.5"
                            style={{
                              top:"50%", transform:"translateY(-50%)", height:18,
                              left: sumStart*DAY_W,
                              width: Math.max(DAY_W, (sumEnd-sumStart)*DAY_W),
                              background: color, opacity: 0.75
                            }}>
                            <span className="text-[9px] font-bold text-white truncate">{projTasks.length} task{projTasks.length!==1?"s":""}</span>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* ADD TASK BAR */}
                    {addingTaskFor === proj.id && (
                      <div className="flex items-center gap-2 px-6 py-1.5 border-b border-blue-100 bg-blue-50">
                        <input autoFocus type="text" value={newTaskName} placeholder="Task name…"
                          onChange={e=>setNewTaskName(e.target.value)}
                          onKeyDown={e=>{if(e.key==="Enter")doAddTask(proj.id);if(e.key==="Escape"){setAddingTaskFor(null);setNewTaskName("");}}}
                          className="max-w-xs px-2.5 py-1 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        <button onClick={()=>doAddTask(proj.id)} className="px-3 py-1 text-xs font-semibold bg-blue-600 text-white rounded-lg hover:bg-blue-700">Add</button>
                        <button onClick={()=>{setAddingTaskFor(null);setNewTaskName("");}} className="text-xs text-gray-400 hover:text-gray-600">Cancel</button>
                      </div>
                    )}

                    {/* TASK ROWS — single line */}
                    {!isCol && projTasks.map(task => {
                      const sc = TASK_STATUS_CFG[task.status] || TASK_STATUS_CFG.not_started;
                      const barColor = task.status==="done" ? "#10b981" : task.status==="in_progress" ? color : "#94a3b8";

                      // Use live drag values if this task is being dragged
                      const isActiveDrag = dragLive && dragLive.taskId === task.id;
                      const liveStart = isActiveDrag && dragLive.startDate ? dragLive.startDate : task.startDate;
                      const liveDur   = isActiveDrag && dragLive.durationDays ? dragLive.durationDays : Math.max(1, task.durationDays||1);

                      const startI = dayIdx(liveStart);
                      const barW   = Math.max(DAY_W, liveDur * DAY_W - 2);
                      const isDraggingThis = isActiveDrag;

                      return (
                        <div key={task.id} className="flex border-b border-gray-100 bg-white hover:bg-blue-50/30 group/row"
                          style={{height:ROW_H, userSelect: isDraggingThis ? "none" : "auto"}}>
                          {/* LEFT — single line, sticky */}
                          <div className="flex items-center gap-1.5 pl-7 pr-1.5 border-r border-gray-100 flex-shrink-0 bg-white"
                            style={{width:PLAN_LEFT_W, position:"sticky", left:0, zIndex:10}}>
                            <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:color}}/>
                            <span className="flex-1 min-w-0 text-xs text-gray-800 font-medium truncate">{task.name}</span>
                            <select value={task.status} onChange={e=>upTask(task.id,{status:e.target.value})}
                              className="text-[9px] font-semibold px-1 py-0.5 rounded border-0 cursor-pointer focus:outline-none flex-shrink-0"
                              style={{background:sc.bg, color:sc.color, minWidth:82}}>
                              {Object.entries(TASK_STATUS_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                            </select>
                            <input type="date" value={liveStart||todayStr}
                              onChange={e=>upTask(task.id,{startDate:e.target.value})}
                              className="text-[9px] text-gray-500 border border-gray-200 rounded px-0.5 py-0.5 focus:outline-none focus:ring-1 focus:ring-blue-400 flex-shrink-0"
                              style={{width:82}}/>
                            <input type="number" min="1" max="999" value={liveDur}
                              onChange={e=>upTask(task.id,{durationDays:Math.max(1,parseInt(e.target.value)||1)})}
                              className="text-[9px] text-gray-500 border border-gray-200 rounded px-0.5 py-0.5 text-center focus:outline-none focus:ring-1 focus:ring-blue-400 flex-shrink-0"
                              style={{width:28}}/>
                            <span className="text-[9px] text-gray-400 flex-shrink-0">d</span>
                            <button onClick={()=>delTask(task.id)}
                              className="p-0.5 text-gray-300 hover:text-red-400 opacity-0 group-hover/row:opacity-100 transition-opacity flex-shrink-0">
                              <IconTrash c="w-3 h-3"/>
                            </button>
                          </div>
                          {/* GANTT BAR */}
                          <div className="relative flex-shrink-0 flex items-center" style={{width:totalW}}>
                            <DayBg h={ROW_H}/>
                            {/* Outside label — shown when bar is too narrow, right-justified against bar's left edge */}
                            {barW <= 44 && startI * DAY_W > 4 && (
                              <div className="pointer-events-none" style={{
                                position:"absolute", top:"50%", transform:"translateY(-50%)",
                                right: totalW - startI * DAY_W + 3,
                                maxWidth:140, zIndex:2, textAlign:"right", whiteSpace:"nowrap", overflow:"hidden",
                              }}>
                                <span style={{fontSize:9, fontWeight:600, color:"#1e293b"}}>{task.name}</span>
                              </div>
                            )}
                            {/* Bar — draggable body */}
                            <div
                              className="absolute rounded flex items-center overflow-hidden select-none"
                              onMouseDown={e => startDrag(e, {...task, startDate:liveStart, durationDays:liveDur}, "move", minDate)}
                              style={{
                                height: 22,
                                left: startI * DAY_W,
                                width: barW,
                                background: barColor,
                                opacity: isDraggingThis ? 1 : task.status==="done" ? 0.65 : 0.88,
                                cursor: "grab",
                                zIndex: isDraggingThis ? 20 : 1,
                                boxShadow: isDraggingThis ? "0 4px 12px rgba(0,0,0,0.25)" : "none",
                                transition: isDraggingThis ? "none" : "box-shadow 0.15s",
                              }}>
                              {/* Label inside bar — only when wide enough */}
                              <span className="flex-1 min-w-0 text-[9px] font-semibold text-white truncate whitespace-nowrap px-1.5 pointer-events-none">
                                {barW > 44 ? task.name : ""}
                              </span>
                              {/* Resize handle — right edge */}
                              <div
                                onMouseDown={e => startDrag(e, {...task, startDate:liveStart, durationDays:liveDur}, "resize", minDate)}
                                style={{
                                  position:"absolute", right:0, top:0, bottom:0, width:7,
                                  cursor:"ew-resize",
                                  background:"rgba(255,255,255,0.25)",
                                  borderLeft:"1px solid rgba(255,255,255,0.35)",
                                  display:"flex", alignItems:"center", justifyContent:"center",
                                  flexShrink:0,
                                }}>
                                <div style={{width:2, height:10, borderLeft:"1.5px solid rgba(255,255,255,0.7)", borderRight:"1.5px solid rgba(255,255,255,0.7)"}}/>
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}

            </div>
          </div>
        </div>
      );
    }

    // =========================================================================
    // PROCUREMENT VIEW
    // =========================================================================
    function ProcurementView({ procurement, onProcurementChange, purchases, onAddPurchase, onDeletePurchase, planData, customAssemblies, asmOverrides }) {
      const todayStr = new Date().toISOString().split("T")[0];
      const projects = planData?.projects ?? [];
      // Procurement shows sub-assembly names that have material line items
      const matCats = useMemo(() => getMaterialAsmNames(customAssemblies, asmOverrides || {}), [customAssemblies, asmOverrides]);

      // ── helpers ────────────────────────────────────────────────────────────
      const syncPurchaseEntry = (item, overrides, allProc, addPurchase, deletePurchase) => {
        if (item.purchaseId) deletePurchase(item.purchaseId);
        const merged = {...item, ...overrides};
        if (!merged.purchased) return { purchaseId: null };
        // Use actualAmount if set, otherwise fall back to estimatedAmount
        const amt = parseFloat(merged.actualAmount) || parseFloat(merged.estimatedAmount) || 0;
        const newId = uid();
        addPurchase({
          id: newId,
          date: merged.purchaseDate || todayStr,
          category: merged.category,
          vendor: merged.vendor || "—",
          description: merged.item || "Procurement item",
          amount: amt,
        });
        return { purchaseId: newId };
      };

      const updateItem = (id, changes) => {
        const current = procurement.find(p => p.id === id);
        if (!current) return;
        let extra = {};
        if (current.purchased) {
          extra = syncPurchaseEntry(current, changes, procurement, onAddPurchase, onDeletePurchase);
        }
        onProcurementChange(procurement.map(p => p.id === id ? {...p, ...changes, ...extra} : p));
      };

      const togglePurchased = (item) => {
        if (!item.purchased) {
          const extra = syncPurchaseEntry({...item, purchased:true}, {}, procurement, onAddPurchase, onDeletePurchase);
          onProcurementChange(procurement.map(p => p.id === item.id
            ? {...p, purchased:true, purchaseDate: p.purchaseDate || todayStr, ...extra} : p));
        } else {
          if (item.purchaseId) onDeletePurchase(item.purchaseId);
          onProcurementChange(procurement.map(p => p.id === item.id
            ? {...p, purchased:false, purchaseId:null} : p));
        }
      };

      const addItem = () => {
        onProcurementChange([...procurement, {
          id: uid(), item:"", vendor:"", project:"",
          category: matCats[0] || PURCHASE_CATS[0], purchased:false,
          purchaseDate:"", estimatedAmount:"", actualAmount:"", purchaseId:null,
        }]);
      };

      const deleteItem = (id) => {
        const item = procurement.find(p => p.id === id);
        if (item?.purchaseId) onDeletePurchase(item.purchaseId);
        onProcurementChange(procurement.filter(p => p.id !== id));
      };

      // ── summary stats ───────────────────────────────────────────────────────
      const pending   = procurement.filter(p => !p.purchased);
      const purchased = procurement.filter(p =>  p.purchased);
      const totalEst  = procurement.reduce((s,p) => s + (parseFloat(p.estimatedAmount)||0), 0);
      const totalAct  = purchased.reduce((s,p)   => s + (parseFloat(p.actualAmount) || parseFloat(p.estimatedAmount)||0), 0);

      const CELL   = "px-2 py-2 text-[11px] text-gray-600 border-t border-gray-100";
      const HDCELL = "px-2 py-2.5 text-[10px] font-bold uppercase tracking-wider text-gray-400 bg-gray-50 text-left whitespace-nowrap";

      return (
        <div className="flex-1 overflow-auto p-6" style={{background:"#f9fafb"}}>

          {/* Summary cards */}
          <div className="grid grid-cols-5 gap-3 mb-5">
            {[
              {label:"Total Items",   val:procurement.length, fmt:false, color:"text-gray-900"},
              {label:"Pending",       val:pending.length,     fmt:false, color:"text-amber-600"},
              {label:"Purchased",     val:purchased.length,   fmt:false, color:"text-emerald-600"},
              {label:"Est. Budget",   val:totalEst,           fmt:true,  color:"text-gray-900"},
              {label:"Actual Spent",  val:totalAct,           fmt:true,  color:"text-blue-700"},
            ].map(({label,val,fmt,color}) => (
              <div key={label} className="bg-white rounded-xl p-4 border border-gray-200">
                <div className="text-[11px] text-gray-400 mb-1">{label}</div>
                <div className={`text-xl font-bold tabular-nums ${color}`}>{fmt ? fmtUSD(val) : val}</div>
              </div>
            ))}
          </div>

          {/* Info banner */}
          <div className="mb-4 flex items-start gap-2 bg-blue-50 border border-blue-200 rounded-xl px-4 py-2.5">
            <IconAlert c="w-4 h-4 text-blue-400 flex-shrink-0 mt-0.5"/>
            <p className="text-[11px] text-blue-700">Items with an <strong>Est. Amount</strong> automatically appear as line items in the Estimate tab. Check an item off to log the <strong>Actual Amount</strong> to the Tracker.</p>
          </div>

          {/* Checklist table */}
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
              <div>
                <h2 className="text-sm font-bold text-gray-800">Procurement Checklist</h2>
                <p className="text-[11px] text-gray-400 mt-0.5">Sub-assembly dropdown shows material-type assemblies — add custom ones in Config.</p>
              </div>
              <button onClick={addItem}
                className="flex items-center gap-1.5 text-xs font-semibold text-blue-600 hover:text-blue-800 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-50 transition-colors">
                <IconPlus c="w-3.5 h-3.5"/> Add Item
              </button>
            </div>

            {procurement.length === 0 ? (
              <div className="py-20 text-center">
                <div className="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center mx-auto mb-3">
                  <IconBuilding c="w-6 h-6 text-gray-300"/>
                </div>
                <p className="text-sm font-medium text-gray-400">No items yet</p>
                <p className="text-xs text-gray-400 mt-1">Click "Add Item" to build your materials list. Estimated amounts feed the Estimate tab.</p>
              </div>
            ) : (
              <table className="w-full" style={{tableLayout:"fixed"}}>
                <colgroup>
                  <col style={{width:"4%"}}/>
                  <col style={{width:"18%"}}/>
                  <col style={{width:"11%"}}/>
                  <col style={{width:"10%"}}/>
                  <col style={{width:"15%"}}/>
                  <col style={{width:"10%"}}/>
                  <col style={{width:"11%"}}/>
                  <col style={{width:"11%"}}/>
                  <col style={{width:"5%"}}/>
                </colgroup>
                <thead>
                  <tr>
                    <th className={HDCELL}></th>
                    <th className={HDCELL}>Item</th>
                    <th className={HDCELL}>Vendor</th>
                    <th className={HDCELL}>Project</th>
                    <th className={HDCELL}>Sub-Assembly</th>
                    <th className={HDCELL}>Date</th>
                    <th className={HDCELL + " text-right"}>Est. Amount</th>
                    <th className={HDCELL + " text-right"}>Actual Amount</th>
                    <th className={HDCELL}></th>
                  </tr>
                </thead>
                <tbody>
                  {procurement.map(item => (
                    <tr key={item.id}
                      className={`group/row transition-colors ${item.purchased ? "bg-emerald-50/50" : "bg-white hover:bg-gray-50/70"}`}>

                      {/* Checkbox */}
                      <td className={CELL + " text-center"}>
                        <input type="checkbox" checked={item.purchased} onChange={() => togglePurchased(item)}
                          title={item.purchased ? "Mark as pending" : "Mark as purchased — logs Actual to Tracker"}
                          className="w-4 h-4 cursor-pointer rounded" style={{accentColor:"#10b981"}}/>
                      </td>

                      {/* Item */}
                      <td className={CELL}>
                        <input type="text" value={item.item} placeholder="Description…"
                          onChange={e => updateItem(item.id, {item: e.target.value})}
                          className={`w-full bg-transparent outline-none text-[12px] font-medium focus:ring-0 truncate ${item.purchased ? "line-through text-gray-400" : "text-gray-800"}`}/>
                      </td>

                      {/* Vendor */}
                      <td className={CELL}>
                        <input type="text" value={item.vendor} placeholder="Vendor…"
                          onChange={e => updateItem(item.id, {vendor: e.target.value})}
                          className="w-full bg-transparent outline-none text-[11px] text-gray-600 focus:ring-0 truncate"/>
                      </td>

                      {/* Project */}
                      <td className={CELL}>
                        {projects.length > 0 ? (
                          <select value={item.project} onChange={e => updateItem(item.id, {project: e.target.value})}
                            className="w-full bg-transparent outline-none text-[11px] text-gray-600 focus:ring-0 cursor-pointer">
                            <option value="">— None —</option>
                            {projects.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                          </select>
                        ) : (
                          <input type="text" value={item.project} placeholder="Project…"
                            onChange={e => updateItem(item.id, {project: e.target.value})}
                            className="w-full bg-transparent outline-none text-[11px] text-gray-600 focus:ring-0 truncate"/>
                        )}
                      </td>

                      {/* Sub-Assembly — material-only sub-assemblies from estimate */}
                      <td className={CELL}>
                        <select value={item.category} onChange={e => updateItem(item.id, {category: e.target.value})}
                          className="w-full bg-transparent outline-none text-[11px] text-gray-600 focus:ring-0 cursor-pointer truncate">
                          <option value="">— Select —</option>
                          {matCats.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </td>

                      {/* Date (purchase date) */}
                      <td className={CELL}>
                        <input type="date" value={item.purchaseDate}
                          onChange={e => updateItem(item.id, {purchaseDate: e.target.value})}
                          className="w-full bg-transparent outline-none text-[11px] text-gray-500 focus:ring-0"/>
                      </td>

                      {/* Est. Amount — feeds Estimate tab */}
                      <td className={CELL + " text-right"}>
                        <div className="flex items-center justify-end gap-0.5">
                          <span className="text-gray-400 text-[10px]">$</span>
                          <input type="number" min="0" step="0.01" value={item.estimatedAmount} placeholder="0"
                            onChange={e => updateItem(item.id, {estimatedAmount: e.target.value})}
                            title="Estimated amount — feeds the Estimate tab"
                            className="w-full bg-transparent outline-none text-[11px] text-right font-semibold text-blue-700 focus:ring-0 tabular-nums"
                            style={{maxWidth:72}}/>
                        </div>
                      </td>

                      {/* Actual Amount — logged to Tracker on purchase */}
                      <td className={CELL + " text-right"}>
                        <div className="flex items-center justify-end gap-0.5">
                          <span className="text-gray-400 text-[10px]">$</span>
                          <input type="number" min="0" step="0.01" value={item.actualAmount || ""} placeholder="0"
                            onChange={e => updateItem(item.id, {actualAmount: e.target.value})}
                            title="Actual amount paid — logged to Tracker when checked off"
                            className={`w-full bg-transparent outline-none text-[11px] text-right font-semibold focus:ring-0 tabular-nums ${item.purchased ? "text-emerald-700" : "text-gray-500"}`}
                            style={{maxWidth:72}}/>
                        </div>
                      </td>

                      {/* Delete */}
                      <td className={CELL + " text-center"}>
                        <button onClick={() => deleteItem(item.id)}
                          className="text-gray-300 hover:text-red-400 opacity-0 group-hover/row:opacity-100 transition-opacity">
                          <IconTrash c="w-3.5 h-3.5"/>
                        </button>
                      </td>
                    </tr>
                  ))}

                  {/* Totals footer */}
                  {procurement.length > 0 && (
                    <tr className="border-t-2 border-gray-200 bg-gray-50">
                      <td colSpan={6} className="px-3 py-2.5 text-[11px] font-semibold text-gray-500">
                        {purchased.length} of {procurement.length} purchased · est. amounts feed Estimate tab
                      </td>
                      <td className="px-2 py-2.5 text-right">
                        <div className="text-[10px] text-gray-400">Est. Total</div>
                        <div className="text-sm font-bold text-blue-700 tabular-nums">{fmtUSD(totalEst)}</div>
                      </td>
                      <td className="px-2 py-2.5 text-right">
                        <div className="text-[10px] text-gray-400">Actual Total</div>
                        <div className="text-sm font-bold text-emerald-700 tabular-nums">{fmtUSD(totalAct)}</div>
                      </td>
                      <td/>
                    </tr>
                  )}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    // =========================================================================
    // SHARED DEFAULTS
    // =========================================================================
    const DEFAULT_SETTINGS = { projectName:"New Estimate", pricingTier:"mid", salesTaxPct:0, contingencyPct:0.1, overheadPct:0.1, profitPct:0.1 };
    const BLANK_PROJECT = (name) => ({
      id: uid(), createdAt: new Date().toISOString(),
      settings: {...DEFAULT_SETTINGS, projectName: name || "New Project"},
      instances: [], rateOverrides: {}, purchases: [], catProgress: {},
      planData: { projects:[], tasks:[] }, procurement: [], costTypeOverrides: {},
    });

    // =========================================================================
    // CONFIG VIEW (global — custom assemblies, custom categories, default pricing)
    // =========================================================================
    function ConfigView({ config, onConfigChange, onClose }) {
      const asmOverrides = config.asmOverrides ?? {};
      const globalRateOverrides = config.globalRateOverrides ?? {};
      const effGroups = getEffectiveGroups(config); // [{id, name}]

      // ── Assembly config state ──────────────────────────────────────────────
      const [editingAsmId, setEditingAsmId] = useState(null);
      const [editingAsmVals, setEditingAsmVals] = useState({});
      const [newSubName, setNewSubName] = useState("");
      const [newSubGroup, setNewSubGroup] = useState(effGroups[0]?.id ?? "");
      const [newSubType, setNewSubType] = useState("labor");
      const [editingGrpId, setEditingGrpId] = useState(null);
      const [editingGrpName, setEditingGrpName] = useState("");
      const [newGrpName, setNewGrpName] = useState("");

      // ── Pricing edit state ─────────────────────────────────────────────────
      const [editingRateKey, setEditingRateKey] = useState(null);
      const [editingRateVals, setEditingRateVals] = useState({});

      // ── Assembly override helpers ──────────────────────────────────────────
      const updateAsmOverride = (id, changes) => {
        const current = asmOverrides[id] || {};
        onConfigChange({ ...config, asmOverrides: { ...asmOverrides, [id]: { ...current, ...changes } } });
      };
      const resetAsmOverride = (id) => {
        const next = { ...asmOverrides }; delete next[id];
        onConfigChange({ ...config, asmOverrides: next });
      };
      const startEditAsm = (a) => {
        setEditingAsmId(a.id);
        setEditingAsmVals({ name: asmOverrides[a.id]?.name ?? a.name, group: asmOverrides[a.id]?.group ?? a.group });
      };
      const saveEditAsm = (a) => {
        const ov = {};
        if (editingAsmVals.name !== a.name) ov.name = editingAsmVals.name;
        if (editingAsmVals.group !== a.group) ov.group = editingAsmVals.group;
        if (Object.keys(ov).length > 0) updateAsmOverride(a.id, ov);
        else resetAsmOverride(a.id);
        setEditingAsmId(null);
      };

      // ── Master group helpers ───────────────────────────────────────────────
      const saveEditGrp = (id) => {
        const t = editingGrpName.trim(); if (!t) { setEditingGrpId(null); return; }
        const updated = effGroups.map(g => g.id === id ? { id, name: t } : g);
        onConfigChange({ ...config, masterGroups: updated });
        setEditingGrpId(null);
      };
      const addGroup = () => {
        const t = newGrpName.trim(); if (!t) return;
        const id = t.toLowerCase().replace(/\s+/g, "_") + "_" + Date.now();
        onConfigChange({ ...config, masterGroups: [...effGroups, { id, name: t }] });
        setNewGrpName("");
      };
      const removeGroup = (id) => {
        // Move any assemblies assigned to this group to the first remaining group
        const remaining = effGroups.filter(g => g.id !== id);
        const fallback = remaining[0]?.id ?? "";
        const newOv = { ...asmOverrides };
        DB.assemblies.forEach(a => {
          const effGrp = newOv[a.id]?.group ?? a.group;
          if (effGrp === id) { newOv[a.id] = { ...(newOv[a.id]||{}), group: fallback }; }
        });
        onConfigChange({ ...config, masterGroups: remaining, asmOverrides: newOv });
      };

      // ── Add custom sub-assembly ────────────────────────────────────────────
      const addSubAsm = () => {
        const t = newSubName.trim(); if (!t) return;
        const item = { id: uid(), name: t, group: newSubGroup, costType: newSubType,
          lineItems: [{ label: t, rateKey: null, qty: 1, unit: "LS",
            customItem: true, unitCost: 0, costType: newSubType }]
        };
        const { customAssemblies = [] } = config;
        onConfigChange({ ...config, customAssemblies: [...customAssemblies, item] });
        setNewSubName("");
      };
      const delCustomAsm = (id) => {
        const { customAssemblies = [] } = config;
        onConfigChange({ ...config, customAssemblies: customAssemblies.filter(a => a.id !== id) });
      };

      // ── Rate override helpers ──────────────────────────────────────────────
      const startEditRate = (k, r) => {
        const ov = globalRateOverrides[k] || {};
        setEditingRateKey(k);
        setEditingRateVals({ low: ov.low ?? r.low, mid: ov.mid ?? r.mid, high: ov.high ?? r.high });
      };
      const saveEditRate = (k) => {
        const r = DB.rates[k];
        const ov = {};
        const lo = parseFloat(editingRateVals.low); if (!isNaN(lo) && lo !== r.low) ov.low = lo;
        const mi = parseFloat(editingRateVals.mid); if (!isNaN(mi) && mi !== r.mid) ov.mid = mi;
        const hi = parseFloat(editingRateVals.high); if (!isNaN(hi) && hi !== r.high) ov.high = hi;
        const next = { ...globalRateOverrides };
        if (Object.keys(ov).length > 0) next[k] = ov; else delete next[k];
        onConfigChange({ ...config, globalRateOverrides: next });
        setEditingRateKey(null);
      };
      const resetRate = (k) => {
        const next = { ...globalRateOverrides }; delete next[k];
        onConfigChange({ ...config, globalRateOverrides: next });
      };

      const SH = "text-[10px] font-bold uppercase tracking-wider text-gray-400";
      const INP = "px-2 py-1 border border-gray-300 rounded text-xs outline-none focus:ring-1 focus:ring-blue-400";
      const INP_SM = "w-16 px-1.5 py-1 border border-blue-300 rounded text-xs text-right outline-none focus:ring-1 focus:ring-blue-400 tabular-nums";

      const allEffGroups = effGroups; // alias for clarity

      return (
        <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-50 overflow-auto py-8 px-4" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl" onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200">
              <h2 className="text-lg font-bold text-gray-900">Configuration</h2>
              <button onClick={onClose} className="p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>

            <div className="p-6 space-y-8">

              {/* ── Section 1: Assembly Configuration ── */}
              <section>
                <h3 className="text-sm font-bold text-gray-800 mb-0.5">Assembly Configuration</h3>
                <p className="text-xs text-gray-400 mb-4">Manage master groups and sub-assemblies. Drag sub-assemblies between groups by changing their group assignment.</p>

                {/* Master groups list */}
                <div className="space-y-4">
                  {allEffGroups.map(grpObj => {
                    const grpId = grpObj.id;
                    const grpColor = getGroupColor(grpId, allEffGroups);
                    // Built-in assemblies assigned to this group
                    const builtInAsms = DB.assemblies.filter(a => (asmOverrides[a.id]?.group ?? a.group) === grpId);
                    // Custom assemblies assigned to this group
                    const { customAssemblies = [] } = config;
                    const customAsms = customAssemblies.filter(ca => (asmOverrides[ca.id]?.group ?? ca.group) === grpId);
                    const allAsms = [...builtInAsms.map(a=>({...a, _isBuiltIn:true})), ...customAsms.map(ca=>({...ca, _isCustom:true}))];

                    return (
                      <div key={grpId} className="rounded-xl border border-gray-200 overflow-hidden">
                        {/* Group header */}
                        <div className="flex items-center gap-2 px-3 py-2 bg-gray-50 border-b border-gray-200">
                          {editingGrpId === grpId ? (
                            <>
                              <input value={editingGrpName} onChange={e=>setEditingGrpName(e.target.value)}
                                onKeyDown={e=>{if(e.key==="Enter")saveEditGrp(grpId);if(e.key==="Escape")setEditingGrpId(null);}}
                                className="flex-1 px-2 py-0.5 border border-blue-400 rounded text-xs font-semibold focus:outline-none" autoFocus/>
                              <button onClick={()=>saveEditGrp(grpId)} className="text-blue-500 hover:text-blue-700 text-[10px] font-bold">Save</button>
                              <button onClick={()=>setEditingGrpId(null)} className="text-gray-400 hover:text-gray-600 text-[10px]">Cancel</button>
                            </>
                          ) : (
                            <>
                              <span className={`text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full ${grpColor}`}>{grpObj.name}</span>
                              <span className="text-[10px] text-gray-400">{allAsms.length} sub-assemblies</span>
                              <div className="flex-1"/>
                              <button onClick={()=>{setEditingGrpId(grpId);setEditingGrpName(grpObj.name);}}
                                className="text-gray-300 hover:text-blue-400 transition-colors" title="Rename group"><IconEdit c="w-3 h-3"/></button>
                              {allEffGroups.length > 1 && (
                                <button onClick={()=>removeGroup(grpId)}
                                  className="text-gray-300 hover:text-red-400 transition-colors ml-1" title="Remove group"><IconTrash c="w-3 h-3"/></button>
                              )}
                            </>
                          )}
                        </div>
                        {/* Sub-assembly rows */}
                        <div className="divide-y divide-gray-50">
                          {allAsms.length === 0 && (
                            <p className="px-4 py-2 text-[11px] text-gray-300 italic">No sub-assemblies yet</p>
                          )}
                          {allAsms.map(a => {
                            const isEditing = editingAsmId === a.id;
                            const effName = asmOverrides[a.id]?.name ?? a.name;
                            const isOverridden = !!asmOverrides[a.id];
                            // Determine costType: custom has .costType; built-in: check if any line item is material
