                            const hasMat = a._isCustom ? a.costType === "material"
                              : (a.lineItems||[]).some(li => li.customItem || li.costType === "material");
                            const typeLabel = hasMat ? "Material" : "Labor";
                            const typeCls = hasMat ? "bg-amber-100 text-amber-700" : "bg-blue-100 text-blue-700";
                            return (
                              <div key={a.id} className="flex items-center gap-2 px-4 py-2 hover:bg-gray-50 group/asmrow text-xs">
                                {isEditing ? (
                                  <>
                                    <input value={editingAsmVals.name} onChange={e=>setEditingAsmVals(v=>({...v,name:e.target.value}))}
                                      onKeyDown={e=>{if(e.key==="Enter")saveEditAsm(a);if(e.key==="Escape")setEditingAsmId(null);}}
                                      className="flex-1 px-2 py-1 border border-blue-400 rounded text-xs focus:outline-none" autoFocus/>
                                    <select value={editingAsmVals.group} onChange={e=>setEditingAsmVals(v=>({...v,group:e.target.value}))}
                                      className="px-1.5 py-1 border border-blue-400 rounded text-xs bg-white focus:outline-none">
                                      {allEffGroups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                                    </select>
                                    <button onClick={()=>saveEditAsm(a)} className="text-blue-500 hover:text-blue-700 font-bold text-[10px]">Save</button>
                                    <button onClick={()=>setEditingAsmId(null)} className="text-gray-400 text-[10px]">Cancel</button>
                                  </>
                                ) : (
                                  <>
                                    <span className={`flex-1 font-medium ${isOverridden?"text-blue-700":"text-gray-800"}`}>{effName}
                                      {isOverridden && <span className="ml-1 text-[9px] text-blue-400">(edited)</span>}
                                    </span>
                                    <span className={`px-1.5 py-0.5 rounded-full text-[10px] font-semibold ${typeCls}`}>{typeLabel}</span>
                                    <div className="flex gap-1 opacity-0 group-hover/asmrow:opacity-100 transition-opacity">
                                      <button onClick={()=>startEditAsm(a)} className="text-gray-400 hover:text-blue-500"><IconEdit c="w-3 h-3"/></button>
                                      {isOverridden && <button onClick={()=>resetAsmOverride(a.id)} title="Reset" className="text-gray-300 hover:text-amber-500"><IconReset c="w-3 h-3"/></button>}
                                      {a._isCustom && <button onClick={()=>delCustomAsm(a.id)} className="text-gray-300 hover:text-red-400"><IconTrash c="w-3 h-3"/></button>}
                                    </div>
                                  </>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Add sub-assembly row */}
                <div className="mt-3 flex gap-2 items-center">
                  <input value={newSubName} onChange={e=>setNewSubName(e.target.value)} placeholder="New sub-assembly name…"
                    onKeyDown={e=>{if(e.key==="Enter")addSubAsm();}}
                    className={INP + " flex-1"}/>
                  <select value={newSubGroup} onChange={e=>setNewSubGroup(e.target.value)} className={INP}>
                    {allEffGroups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                  </select>
                  <div className="flex rounded-lg overflow-hidden border border-gray-300 text-[10px] font-bold">
                    {["labor","material"].map(t=>(
                      <button key={t} onClick={()=>setNewSubType(t)}
                        className={`px-2.5 py-1.5 transition-colors ${newSubType===t ? (t==="labor"?"bg-blue-500 text-white":"bg-amber-500 text-white") : "bg-white text-gray-500 hover:bg-gray-50"}`}>
                        {t==="labor"?"L":"M"}
                      </button>
                    ))}
                  </div>
                  <button onClick={addSubAsm} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg transition-colors">Add</button>
                </div>

                {/* Add master group row */}
                <div className="mt-2 flex gap-2 items-center">
                  <input value={newGrpName} onChange={e=>setNewGrpName(e.target.value)} placeholder="New master group name…"
                    onKeyDown={e=>{if(e.key==="Enter")addGroup();}}
                    className={INP + " flex-1"}/>
                  <button onClick={addGroup} className="px-3 py-1.5 bg-gray-700 hover:bg-gray-900 text-white text-xs font-semibold rounded-lg transition-colors">Add Group</button>
                </div>
              </section>

              {/* ── Section 2: Default Pricing Reference ── */}
              <section>
                <h3 className="text-sm font-bold text-gray-800 mb-0.5">Default Pricing Reference</h3>
                <p className="text-xs text-gray-400 mb-3">Click any row to edit rates. Changes apply globally across all projects.</p>
                <div className="max-h-72 overflow-y-auto rounded-xl border border-gray-200">
                  <table className="w-full text-xs" style={{tableLayout:"fixed"}}>
                    <thead className="sticky top-0 bg-gray-50 border-b border-gray-200 z-10">
                      <tr>
                        <th className={SH + " px-3 py-2 text-left"} style={{width:"38%"}}>Item</th>
                        <th className={SH + " px-3 py-2 text-left"} style={{width:"18%"}}>Category</th>
                        <th className={SH + " px-3 py-2 text-right"} style={{width:"12%"}}>Unit</th>
                        <th className={SH + " px-3 py-2 text-right"} style={{width:"13%"}}>Low</th>
                        <th className={SH + " px-3 py-2 text-right"} style={{width:"13%"}}>Mid</th>
                        <th className={SH + " px-3 py-2 text-right"} style={{width:"13%"}}>High</th>
                        <th style={{width:"28px"}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {Object.entries(DB.rates).map(([k,r]) => {
                        const ov = globalRateOverrides[k] || {};
                        const isEditing = editingRateKey === k;
                        const isOverridden = !!globalRateOverrides[k];
                        const effLow = ov.low ?? r.low;
                        const effMid = ov.mid ?? r.mid;
                        const effHigh = ov.high ?? r.high;
                        return (
                          <tr key={k} onClick={()=>!isEditing && startEditRate(k,r)}
                            className={`border-t border-gray-100 cursor-pointer ${isEditing?"bg-blue-50":"hover:bg-gray-50"} group/raterow`}>
                            <td className="px-3 py-1.5 text-gray-700 truncate font-medium">
                              {r.label}{isOverridden && <span className="ml-1 text-[9px] text-blue-400">(edited)</span>}
                            </td>
                            <td className="px-3 py-1.5 text-gray-400 truncate">{r.category}</td>
                            <td className="px-3 py-1.5 text-gray-400 text-right">{r.unit}</td>
                            {isEditing ? (
                              <>
                                <td className="px-1 py-1"><input value={editingRateVals.low} onChange={e=>setEditingRateVals(v=>({...v,low:e.target.value}))} className={INP_SM} type="number" min="0" step="0.01"/></td>
                                <td className="px-1 py-1"><input value={editingRateVals.mid} onChange={e=>setEditingRateVals(v=>({...v,mid:e.target.value}))} className={INP_SM + " font-semibold"} type="number" min="0" step="0.01"/></td>
                                <td className="px-1 py-1"><input value={editingRateVals.high} onChange={e=>setEditingRateVals(v=>({...v,high:e.target.value}))} className={INP_SM} type="number" min="0" step="0.01"
                                  onKeyDown={e=>{if(e.key==="Enter")saveEditRate(k);if(e.key==="Escape")setEditingRateKey(null);}}/></td>
                                <td className="px-1 py-1">
                                  <button onClick={e=>{e.stopPropagation();saveEditRate(k);}} className="text-blue-500 hover:text-blue-700 font-bold text-[10px]">✓</button>
                                </td>
                              </>
                            ) : (
                              <>
                                <td className={`px-3 py-1.5 text-right tabular-nums ${isOverridden&&ov.low!==undefined?"text-blue-600 font-medium":"text-gray-500"}`}>{fmtUSD2(effLow)}</td>
                                <td className={`px-3 py-1.5 text-right tabular-nums font-semibold ${isOverridden&&ov.mid!==undefined?"text-blue-700":"text-blue-700"}`}>{fmtUSD2(effMid)}</td>
                                <td className={`px-3 py-1.5 text-right tabular-nums ${isOverridden&&ov.high!==undefined?"text-blue-600 font-medium":"text-gray-500"}`}>{fmtUSD2(effHigh)}</td>
                                <td className="px-1 py-1 text-right">
                                  {isOverridden && <button onClick={e=>{e.stopPropagation();resetRate(k);}} className="text-gray-300 hover:text-amber-500 opacity-0 group-hover/raterow:opacity-100 transition-opacity"><IconReset c="w-3 h-3"/></button>}
                                </td>
                              </>
                            )}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================================
    // HOME VIEW (project dashboard)
    // =========================================================================
    const CARD_COLORS = ["#3b82f6","#8b5cf6","#10b981","#f59e0b","#f43f5e","#06b6d4","#f97316","#ec4899"];

    function HomeView({ projects, onOpen, onAdd, onDelete, config, onConfigChange }) {
      const [showNew, setShowNew] = useState(false);
      const [newName, setNewName] = useState("");
      const [showConfig, setShowConfig] = useState(false);

      const doAdd = () => {
        if (!newName.trim()) return;
        onAdd(newName.trim());
        setNewName(""); setShowNew(false);
      };

      const getStats = (proj) => {
        const tier = proj.settings?.pricingTier ?? "mid";
        const projCustomAsms = config?.customAssemblies ?? [];
        const projAsmOverrides = config?.asmOverrides ?? {};
        const projGlobalRateOverrides = config?.globalRateOverrides ?? {};
        const asmBudget = (proj.instances ?? []).flatMap(inst => {
          const def = getEffectiveDef(inst.assemblyId, projCustomAsms, projAsmOverrides);
          if (!def) return [];
          return computeLineItems(def, inst.inputs, tier, proj.rateOverrides ?? {}, proj.costTypeOverrides ?? {}, projGlobalRateOverrides, inst.materialMode);
        }).reduce((s, li) => s + li.total, 0);
        const procBudget = getProcurementLineItems(proj.procurement ?? []).reduce((s, li) => s + li.total, 0);
        const budget = asmBudget + procBudget;
        const spent = (proj.purchases ?? []).reduce((s, p) => s + (p.amount||0), 0);
        const tasks = proj.planData?.tasks ?? [];
        let planStart = null, planEnd = null;
        tasks.forEach(t => {
          if (!t.startDate) return;
          const s = new Date(t.startDate + "T00:00:00");
          const e = new Date(s); e.setDate(e.getDate() + Math.max(1, t.durationDays||1));
          if (!planStart || s < planStart) planStart = s;
          if (!planEnd || e > planEnd) planEnd = e;
        });
        const pendingProc = (proj.procurement ?? []).filter(p => !p.purchased).length;
        const created = proj.createdAt
          ? new Date(proj.createdAt).toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"})
          : "";
        return { budget, spent, planStart, planEnd, pendingProc, created };
      };

      const fmt = (d, opts) => d ? d.toLocaleDateString("en-US", opts) : "";

      return (
        <div className="min-h-screen" style={{background:"#f1f5f9", fontFamily:"system-ui,-apple-system,sans-serif"}}>
          {/* Header */}
          <div className="bg-gray-900 text-white px-8 py-4 flex items-center gap-3 shadow-lg">
            <IconBuilding c="w-6 h-6 text-blue-400"/>
            <span className="font-black text-xl tracking-tight">TradeScope</span>
            <span className="text-gray-500 text-sm">· San Diego, CA</span>
            <div className="flex-1"/>
            <button onClick={()=>setShowConfig(true)}
              className="flex items-center gap-2 px-3 py-2 bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm font-semibold rounded-lg transition-colors mr-2">
              <IconSettings c="w-4 h-4"/> Config
            </button>
            <button onClick={()=>setShowNew(true)}
              className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition-colors">
              <IconPlus c="w-4 h-4"/> New Project
            </button>
          </div>

          {/* Content */}
          <div className="px-8 py-8 max-w-7xl mx-auto">
            <h1 className="text-2xl font-bold text-gray-900 mb-0.5">Projects</h1>
            <p className="text-sm text-gray-400 mb-7">{projects.length} project{projects.length!==1?"s":""} · TradeScope Construction Estimator</p>

            {projects.length === 0 ? (
              <div className="bg-white rounded-2xl border border-gray-200 py-28 text-center">
                <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                  <IconBuilding c="w-8 h-8 text-blue-300"/>
                </div>
                <h3 className="text-lg font-bold text-gray-400 mb-2">No projects yet</h3>
                <p className="text-sm text-gray-400 mb-6">Create your first project to get started.</p>
                <button onClick={()=>setShowNew(true)}
                  className="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors">
                  <IconPlus c="w-4 h-4"/> New Project
                </button>
              </div>
            ) : (
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(340px, 1fr))", gap:20}}>
                {projects.map((proj, pi) => {
                  const color = CARD_COLORS[pi % CARD_COLORS.length];
                  const s = getStats(proj);
                  const pct = s.budget > 0 ? Math.min(100, s.spent / s.budget * 100) : 0;
                  const barColor = pct > 90 ? "#ef4444" : pct > 70 ? "#f59e0b" : color;
                  const planLabel = s.planStart
                    ? `${fmt(s.planStart,{month:"short",day:"numeric"})} → ${fmt(s.planEnd,{month:"short",day:"numeric",year:"numeric"})}`
                    : null;
                  return (
                    <div key={proj.id} onClick={()=>onOpen(proj.id)}
                      className="bg-white rounded-2xl border border-gray-200 overflow-hidden cursor-pointer hover:shadow-xl hover:border-gray-300 transition-all group relative"
                      style={{borderTop:`4px solid ${color}`}}>
                      <div className="p-5">
                        {/* Title row */}
                        <div className="flex items-start justify-between gap-2 mb-4">
                          <div>
                            <h3 className="font-bold text-gray-900 text-lg leading-tight">{proj.settings?.projectName || "Untitled"}</h3>
                            <p className="text-[11px] text-gray-400 mt-0.5">Created {s.created}</p>
                          </div>
                          <button onClick={e=>{e.stopPropagation();onDelete(proj.id);}}
                            className="p-1.5 text-gray-200 hover:text-red-400 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                            <IconTrash c="w-4 h-4"/>
                          </button>
                        </div>

                        {/* Budget + Spent */}
                        <div className="grid grid-cols-2 gap-3 mb-4">
                          <div className="bg-gray-50 rounded-xl p-3">
                            <div className="text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Budget</div>
                            <div className="text-xl font-bold text-gray-900 tabular-nums">{fmtUSD(s.budget)}</div>
                          </div>
                          <div className="bg-gray-50 rounded-xl p-3">
                            <div className="text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Spent</div>
                            <div className="text-xl font-bold tabular-nums" style={{color: pct>90?"#ef4444":pct>70?"#f59e0b":"#059669"}}>{fmtUSD(s.spent)}</div>
                          </div>
                        </div>

                        {/* Burn bar */}
                        {s.budget > 0 && (
                          <div className="mb-4">
                            <div className="flex justify-between text-[10px] text-gray-400 mb-1.5">
                              <span>Budget utilized</span><span className="font-semibold">{pct.toFixed(0)}%</span>
                            </div>
                            <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                              <div style={{width:`${pct}%`, background:barColor, height:"100%", borderRadius:9999, transition:"width .3s"}}/>
                            </div>
                          </div>
                        )}

                        {/* Chips */}
                        <div className="flex flex-wrap gap-1.5">
                          {planLabel && <span className="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-semibold">📅 {planLabel}</span>}
                          {s.pendingProc>0 && <span className="text-[10px] bg-amber-50 text-amber-600 px-2 py-1 rounded-full font-semibold">🛒 {s.pendingProc} pending</span>}
                          {(proj.instances?.length??0)>0 && <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded-full font-semibold">{proj.instances.length} assembl{proj.instances.length===1?"y":"ies"}</span>}
                          {(proj.procurement?.length??0)>0 && <span className="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-semibold">✓ {proj.procurement.filter(p=>p.purchased).length}/{proj.procurement.length} procured</span>}
                        </div>
                      </div>
                      {/* Arrow */}
                      <div className="absolute bottom-4 right-4 text-gray-200 group-hover:text-gray-400 transition-colors">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7"/></svg>
                      </div>
                    </div>
                  );
                })}

                {/* New project card */}
                <div onClick={()=>setShowNew(true)}
                  className="bg-white rounded-2xl border-2 border-dashed border-gray-200 hover:border-blue-300 hover:bg-blue-50/30 cursor-pointer transition-all flex flex-col items-center justify-center py-14 group"
                  style={{minHeight:200}}>
                  <div className="w-10 h-10 bg-gray-100 group-hover:bg-blue-100 rounded-xl flex items-center justify-center mb-3 transition-colors">
                    <IconPlus c="w-5 h-5 text-gray-400 group-hover:text-blue-500"/>
                  </div>
                  <span className="text-sm font-semibold text-gray-400 group-hover:text-blue-500 transition-colors">New Project</span>
                </div>
              </div>
            )}
          </div>

          {/* New project modal */}
          {showNew && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={()=>{setShowNew(false);setNewName("");}}>
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm mx-4" onClick={e=>e.stopPropagation()}>
                <h2 className="text-lg font-bold text-gray-900 mb-1">New Project</h2>
                <p className="text-sm text-gray-400 mb-4">Give your project a name to get started.</p>
                <input autoFocus type="text" value={newName} placeholder="e.g. 123 Main St — Retail TI"
                  onChange={e=>setNewName(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")doAdd();if(e.key==="Escape"){setShowNew(false);setNewName("");}}}
                  className="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4"/>
                <div className="flex gap-2">
                  <button onClick={doAdd} className="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors">Create</button>
                  <button onClick={()=>{setShowNew(false);setNewName("");}} className="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold rounded-xl transition-colors">Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Config modal */}
          {showConfig && config && (
            <ConfigView config={config} onConfigChange={onConfigChange} onClose={()=>setShowConfig(false)}/>
          )}
        </div>
      );
    }

    // =========================================================================
    // PROJECT VIEW (was: main app — now per-project)
    // =========================================================================

    function TradeScope({ initialData, onUpdate, onGoHome, onSwitchProject, allProjects, config }) {
      const [settings,          setSettings]          = useState(initialData?.settings          ?? {...DEFAULT_SETTINGS});
      const [instances,         setInstances]         = useState(initialData?.instances         ?? []);
      const [rateOverrides,     setRateOverrides]     = useState(initialData?.rateOverrides     ?? {});
      const [purchases,         setPurchases]         = useState(initialData?.purchases         ?? []);
      const [catProgress,       setCatProgress]       = useState(initialData?.catProgress       ?? {});
      const [planData,          setPlanData]          = useState(initialData?.planData          ?? { projects:[], tasks:[] });
      const [procurement,       setProcurement]       = useState(initialData?.procurement       ?? []);
      const [costTypeOverrides, setCostTypeOverrides] = useState(initialData?.costTypeOverrides ?? {});
      const [addingDef,   setAddingDef]   = useState(null);
      const [editingPair, setEditingPair] = useState(null);
      const [showSettings,setShowSettings]= useState(false);
      const [editingName, setEditingName] = useState(false);
      const [activeView,  setActiveView]  = useState("estimate"); // "estimate" | "tracker" | "plan" | "procurement"

      const customAssemblies = config?.customAssemblies ?? [];
      const asmOverrides = config?.asmOverrides ?? {};
      const globalRateOverrides = config?.globalRateOverrides ?? {};
      const effectiveGroups = getEffectiveGroups(config);

      useEffect(() => {
        onUpdate({ settings, instances, rateOverrides, purchases, catProgress, planData, procurement, costTypeOverrides });
      }, [settings, instances, rateOverrides, purchases, catProgress, planData, procurement, costTypeOverrides]);

      const addAssembly = (def, inputs, materialMode) => { setInstances(p=>[...p,{id:uid(),assemblyId:def.id,inputs,materialMode:materialMode||"estimate"}]); setAddingDef(null); };
      const updateAssembly = (id, inputs, materialMode) => { setInstances(p=>p.map(i=>i.id===id?{...i,inputs,materialMode:materialMode||"estimate"}:i)); setEditingPair(null); };
      const removeAssembly = id => setInstances(p=>p.filter(i=>i.id!==id));
      const setOverride = (k,v) => setRateOverrides(p=>({...p,[k]:v}));
      const resetOverride = k => setRateOverrides(p=>{ const n={...p}; delete n[k]; return n; });
      const setCostTypeOverride = (rateKey, ct) => setCostTypeOverrides(p=>({...p,[rateKey]:ct}));
      const addPurchase = p => setPurchases(prev=>[...prev,p]);
      const deletePurchase = id => setPurchases(prev=>prev.filter(p=>p.id!==id));
      const tier = settings.pricingTier;

      const printEstimate = () => {
        const asmItems = instances.flatMap(inst => {
          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if(!def) return [];
          return computeLineItems(def, inst.inputs, tier, rateOverrides, costTypeOverrides, globalRateOverrides, inst.materialMode).map(li => ({...li, asmName: def.name, asmGroup: def.group}));
        });
        const procItems = getProcurementLineItems(procurement).map(li => ({...li, asmName: "Procurement Materials", asmGroup: "Procurement"}));
        const allItems = [...asmItems, ...procItems];
        const direct = allItems.reduce((s,i)=>s+i.total,0);
        const contingency = direct * settings.contingencyPct;
        const base = direct + contingency;
        const overhead = base * settings.overheadPct;
        const profit = base * settings.profitPct;
        const tax = direct * settings.salesTaxPct;
        const total = base + overhead + profit + tax;
        const fmt = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
        const fmt2 = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
        const tierLabel = {low:"Low",mid:"Mid",high:"High"}[tier];
        const date = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});

        // Group items by assembly (+ procurement block)
        const asmMap = {};
        instances.forEach(inst => {
          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if(!def) return;
          const items = computeLineItems(def, inst.inputs, tier, rateOverrides, costTypeOverrides, globalRateOverrides, inst.materialMode);
          if(!asmMap[inst.id]) asmMap[inst.id] = { name: def.name, group: def.group, items };
        });
        const procLineItems = getProcurementLineItems(procurement);
        if (procLineItems.length > 0) asmMap["__procurement"] = { name: "Procurement Materials", group: "Procurement", items: procLineItems };

        const asmRows = Object.values(asmMap).map(({name,group,items}) => {
          const sub = items.reduce((s,i)=>s+i.total,0);
          const liRows = items.map(li =>
            `<tr><td>${li.label}<div class="cat">${li.category}</div></td><td class="num">${li.qty.toLocaleString()} ${li.unit}</td><td class="num">${fmt2(li.unitCost)}</td><td class="num total">${fmt(li.total)}</td></tr>`
          ).join("");
          return `
            <div class="asm-block">
              <div class="asm-header">
                <span class="asm-name">${name}</span>
                <span class="asm-group">${group}</span>
                <span class="asm-sub">${fmt(sub)}</span>
              </div>
              <table>
                <thead><tr><th>Description</th><th class="num">Qty</th><th class="num">Unit Cost</th><th class="num">Total</th></tr></thead>
                <tbody>${liRows}</tbody>
              </table>
            </div>`;
        }).join("");

        const summaryRows = [
          ["Direct Costs", fmt(direct), false],
          [`Contingency (${(settings.contingencyPct*100).toFixed(0)}%)`, fmt(contingency), false],
          ["Cost w/ Contingency", fmt(base), true],
          [`Overhead (${(settings.overheadPct*100).toFixed(0)}%)`, fmt(overhead), false],
          [`Profit (${(settings.profitPct*100).toFixed(0)}%)`, fmt(profit), false],
          ...(settings.salesTaxPct>0 ? [[`Sales Tax (${(settings.salesTaxPct*100).toFixed(0)}%)`, fmt(tax), false]] : []),
        ].map(([l,v,b])=>`<tr class="${b?"subtotal":""}"><td>${l}</td><td class="num">${v}</td></tr>`).join("");

        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
        <title>${settings.projectName} — TradeScope Estimate</title>
        <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; color: #111; background: #fff; padding: 32px 40px; }
          .page-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 16px; border-bottom: 2px solid #111; margin-bottom: 24px; }
          .logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
          .logo span { color: #3b82f6; }
          .meta { text-align: right; color: #555; font-size: 10px; line-height: 1.6; }
          .meta .project { font-size: 15px; font-weight: 800; color: #111; margin-bottom: 2px; }
          .tier-badge { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; background: #dbeafe; color: #1d4ed8; }
          .asm-block { margin-bottom: 18px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; break-inside: avoid; }
          .asm-header { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
          .asm-name { font-weight: 700; font-size: 11.5px; flex: 1; }
          .asm-group { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 1px 6px; border-radius: 99px; background: #f3f4f6; color: #6b7280; }
          .asm-sub { font-weight: 800; font-size: 12px; margin-left: auto; }
          table { width: 100%; border-collapse: collapse; }
          th { padding: 5px 10px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; border-bottom: 1px solid #f3f4f6; }
          td { padding: 5px 10px; border-bottom: 1px solid #f9fafb; vertical-align: top; }
          tr:last-child td { border-bottom: none; }
          .num { text-align: right; font-variant-numeric: tabular-nums; }
          .total { font-weight: 600; }
          .cat { font-size: 9px; color: #9ca3af; margin-top: 1px; }
          .summary-section { margin-top: 28px; display: flex; justify-content: flex-end; }
          .summary-box { width: 280px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
          .summary-box table { width: 100%; }
          .summary-box th { padding: 7px 12px; font-size: 10px; background: #f9fafb; }
          .summary-box td { padding: 5px 12px; font-size: 11px; }
          .summary-box tr.subtotal td { font-weight: 700; border-top: 1px solid #e5e7eb; padding-top: 7px; }
          .grand-total { background: #111; }
          .grand-total td { color: #fff; font-weight: 900; font-size: 14px; padding: 10px 12px; border: none; }
          .footer { margin-top: 32px; padding-top: 12px; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 9px; display: flex; justify-content: space-between; }
          @media print { body { padding: 20px 28px; } .no-print { display: none; } }
        </style>
        </head><body>
          <div class="page-header">
            <div><div class="logo">Trade<span>Scope</span></div><div style="color:#9ca3af;font-size:10px;margin-top:3px;">San Diego, CA · Construction Estimator</div></div>
            <div class="meta">
              <div class="project">${settings.projectName}</div>
              <div>${date}</div>
              <div style="margin-top:4px;"><span class="tier-badge">${tierLabel} Pricing</span></div>
            </div>
          </div>
          ${asmRows}
          <div class="summary-section">
            <div class="summary-box">
              <table>
                <thead><tr><th colspan="2">Cost Summary</th></tr></thead>
                <tbody>${summaryRows}</tbody>
                <tfoot><tr class="grand-total"><td>Total Sell Price</td><td class="num">${fmt(total)}</td></tr></tfoot>
              </table>
            </div>
          </div>
          <div class="footer">
            <span>Generated by TradeScope · tradescope.app</span>
            <span>${instances.length} assembl${instances.length===1?"y":"ies"} · ${tier} pricing tier</span>
          </div>
          <script>window.onload=()=>window.print();<\/script>
        </body></html>`;

        const w = window.open("","_blank"); w.document.write(html); w.document.close();
      };

      return (
        <div className="h-screen flex flex-col bg-gray-50 overflow-hidden" style={{fontFamily:"system-ui,-apple-system,sans-serif"}}>
          {/* Header */}
          <header className="bg-gray-900 text-white flex items-center gap-3 px-4 py-2.5 flex-shrink-0 shadow-lg z-10">
            {/* Back to home */}
            <button onClick={onGoHome} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-white px-2 py-1.5 rounded-lg hover:bg-gray-700 transition-colors flex-shrink-0" title="All Projects">
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 19l-7-7 7-7"/></svg>
              Projects
            </button>
            <div className="h-4 w-px bg-gray-700 flex-shrink-0"/>
            <IconBuilding c="w-4 h-4 text-blue-400 flex-shrink-0"/>
            {/* Project name (editable) */}
            {editingName ? (
              <input autoFocus type="text" value={settings.projectName}
                onChange={e=>setSettings(s=>({...s,projectName:e.target.value}))}
                onBlur={()=>setEditingName(false)}
                onKeyDown={e=>{if(e.key==="Enter"||e.key==="Escape")setEditingName(false);}}
                className="bg-gray-800 text-white text-sm px-2 py-1 rounded border border-gray-600 outline-none w-52 flex-shrink-0"/>
            ) : (
              <button onClick={()=>setEditingName(true)} className="flex items-center gap-1.5 text-sm font-semibold text-white hover:text-blue-300 group flex-shrink-0 max-w-xs">
                <span className="truncate">{settings.projectName}</span>
                <IconEdit c="w-3 h-3 text-gray-600 group-hover:text-blue-400 flex-shrink-0"/>
              </button>
            )}
            {/* Project switcher */}
            {allProjects.length > 1 && (
              <select onChange={e=>onSwitchProject(e.target.value)} value={initialData?.id ?? ""}
                onClick={e=>e.stopPropagation()}
                className="bg-gray-800 text-gray-400 text-xs border border-gray-700 rounded-lg px-2 py-1 outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer flex-shrink-0">
                {allProjects.map(p => <option key={p.id} value={p.id}>{p.settings?.projectName || "Untitled"}</option>)}
              </select>
            )}
            <div className="flex-1"/>

            {/* View toggle */}
            <div className="flex rounded-lg overflow-hidden border border-gray-600">
              <button onClick={()=>setActiveView("estimate")}
                className={`flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-colors ${activeView==="estimate"?"bg-blue-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>
                <IconEstimate c="w-3.5 h-3.5"/> Estimate
              </button>
              <button onClick={()=>setActiveView("tracker")}
                className={`flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-colors ${activeView==="tracker"?"bg-blue-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>
                <IconTracker c="w-3.5 h-3.5"/> Tracker {purchases.length>0&&<span className="bg-blue-500 text-white rounded-full px-1.5 py-0.5 text-[10px] ml-0.5">{purchases.length}</span>}
              </button>
              <button onClick={()=>setActiveView("plan")}
                className={`flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-colors ${activeView==="plan"?"bg-blue-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>
                <IconEstimate c="w-3.5 h-3.5"/> Plan {planData.tasks.length>0&&<span className="bg-blue-500 text-white rounded-full px-1.5 py-0.5 text-[10px] ml-0.5">{planData.tasks.length}</span>}
              </button>
              <button onClick={()=>setActiveView("procurement")}
                className={`flex items-center gap-1.5 px-3 py-1 text-xs font-semibold transition-colors ${activeView==="procurement"?"bg-blue-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>
                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                Procurement {procurement.length>0&&<span className="bg-blue-500 text-white rounded-full px-1.5 py-0.5 text-[10px] ml-0.5">{procurement.filter(p=>!p.purchased).length||procurement.length}</span>}
              </button>
            </div>

            {activeView==="estimate" && <>
              <div className="h-4 w-px bg-gray-700"/>
              {instances.length>0 && <>
                <span className="text-xs text-gray-500 hidden sm:block">{instances.length} assembl{instances.length===1?"y":"ies"}</span>
                <button onClick={printEstimate} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-white px-2 py-1 rounded hover:bg-gray-700 transition-colors hidden sm:flex" title="Print estimate">
                  <IconPrint c="w-3.5 h-3.5"/> Print
                </button>
                <button onClick={()=>{ if(confirm("Clear all assemblies?")){ setInstances([]); setRateOverrides({}); setCostTypeOverrides({}); }}} className="text-xs text-gray-500 hover:text-red-400 px-2 py-1 rounded hidden sm:block">Clear</button>
              </>}
            </>}
          </header>

          {activeView === "estimate" ? (
            /* 3-column layout */
            <div className="flex flex-1 overflow-hidden">
              <div className="w-56 flex-shrink-0"><AssemblyPalette onAdd={setAddingDef} customAssemblies={customAssemblies} asmOverrides={asmOverrides} effectiveGroups={effectiveGroups}/></div>
              <div className="flex-1 overflow-y-auto">
                {instances.length===0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-center px-8 pb-16">
                    <div className="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
                      <IconBuilding c="w-8 h-8 text-gray-300"/>
                    </div>
                    <h3 className="text-lg font-bold text-gray-400 mb-1">No assemblies yet</h3>
                    <p className="text-sm text-gray-400 max-w-xs">Select an assembly from the left panel to start building your estimate.</p>
                    <div className="mt-6 flex items-center gap-2 text-xs text-gray-400 bg-gray-100 px-3 py-2 rounded-lg">
                      <IconAlert/> All costs driven by the JSON rate database — no hardcoded values.
                    </div>
                  </div>
                ) : (
                  <div className="p-4 space-y-4">
                    {(() => {
                      // Build sub-assembly name → master group map (respects overrides)
                      const asmNameToGroup = {};
                      DB.assemblies.forEach(a => { const d = applyAsmOverrides(a, asmOverrides); asmNameToGroup[d.name] = d.group; });
                      customAssemblies.forEach(ca => { const d = applyAsmOverrides(customAsmToDef(ca), asmOverrides); if (d) asmNameToGroup[d.name] = d.group; });
                      const allProcItems = getProcurementLineItems(procurement);

                      const groups = effectiveGroups.map(grpObj => {
                        const group = grpObj.id;
                        const grpInstances = instances.filter(inst => {
                          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides);
                          return def && def.group === group;
                        });
                        const grpProcItems = allProcItems.filter(item => asmNameToGroup[item.category] === group);
                        if (grpInstances.length === 0 && grpProcItems.length === 0) return null;

                        const asmTotal = grpInstances.reduce((s, inst) => {
                          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if (!def) return s;
                          return s + computeLineItems(def, inst.inputs, tier, rateOverrides, costTypeOverrides, globalRateOverrides, inst.materialMode).reduce((ss,li)=>ss+li.total,0);
                        }, 0);
                        const grpProcTotal = grpProcItems.reduce((s,i)=>s+i.total,0);
                        const grpTotal = asmTotal + grpProcTotal;

                        // Group by sub-assembly name — instances and proc items interleaved
                        const instancesByName = {};
                        grpInstances.forEach(inst => {
                          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if (!def) return;
                          (instancesByName[def.name] = instancesByName[def.name]||[]).push({inst, def});
                        });
                        const procBySubAsm = {};
                        grpProcItems.forEach(item => { (procBySubAsm[item.category] = procBySubAsm[item.category]||[]).push(item); });
                        // Ordered list: instance sub-asm names first (in order), then proc-only names
                        const seenNames = new Set();
                        const orderedNames = [];
                        grpInstances.forEach(inst => {
                          const def = getEffectiveDef(inst.assemblyId, customAssemblies, asmOverrides); if (!def) return;
                          if (!seenNames.has(def.name)) { seenNames.add(def.name); orderedNames.push(def.name); }
                        });
                        Object.keys(procBySubAsm).forEach(n => { if (!seenNames.has(n)) { seenNames.add(n); orderedNames.push(n); } });

                        return (
                          <div key={group} className="space-y-2">
                            <div className="flex items-center gap-3 px-1 py-1">
                              <span className={`text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full ${getGroupColor(group, effectiveGroups)}`}>{grpObj.name}</span>
                              <div className="flex-1 h-px bg-gray-200"/>
                              <span className="text-xs font-bold text-gray-500 tabular-nums">{fmtUSD(grpTotal)}</span>
                            </div>
                            <div className="space-y-2 pl-2">
                              {orderedNames.map(asmName => {
                                const insts = instancesByName[asmName] || [];
                                const pItems = procBySubAsm[asmName] || [];
                                return (
                                  <div key={asmName} className="space-y-1.5">
                                    {insts.map(({inst, def}, idx) => (
                                      <AssemblyCard key={inst.id} instance={inst} asmDef={def} tier={tier} rateOverrides={rateOverrides}
                                        costTypeOverrides={costTypeOverrides} globalRateOverrides={globalRateOverrides}
                                        onEdit={inst=>setEditingPair({instance:inst,def})} onRemove={removeAssembly}
                                        onRateOverride={setOverride} onResetRateOverride={resetOverride}
                                        onCostTypeChange={setCostTypeOverride}
                                        procItems={idx === 0 ? pItems : []}/>
                                    ))}
                                    {/* Only show standalone ProcCard when there's no matching assembly instance */}
                                    {insts.length === 0 && pItems.length > 0 && <ProcCard subAsm={asmName} items={pItems}/>}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      }).filter(Boolean);

                      // Ungrouped procurement items (sub-assembly not matched to any group)
                      const ungrouped = allProcItems.filter(item => !asmNameToGroup[item.category]);
                      if (ungrouped.length > 0) {
                        const ungroupedTotal = ungrouped.reduce((s,i)=>s+i.total,0);
                        const bySubAsm = {};
                        ungrouped.forEach(item => { (bySubAsm[item.category||"Other"] = bySubAsm[item.category||"Other"]||[]).push(item); });
                        groups.push(
                          <div key="__ungrouped" className="space-y-2">
                            <div className="flex items-center gap-3 px-1 py-1">
                              <span className="text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full bg-gray-100 text-gray-500">Other</span>
                              <div className="flex-1 h-px bg-gray-200"/>
                              <span className="text-xs font-bold text-gray-500 tabular-nums">{fmtUSD(ungroupedTotal)}</span>
                            </div>
                            <div className="space-y-2 pl-2">
                              {Object.entries(bySubAsm).map(([subAsm, items]) => (
                                <ProcCard key={subAsm} subAsm={subAsm} items={items}/>
                              ))}
                            </div>
                          </div>
                        );
                      }
                      return groups;
                    })()}
                  </div>
                )}
              </div>
              <div className="flex-shrink-0" style={{width:"299px"}}>
                <SummaryPanel instances={instances} tier={tier} rateOverrides={rateOverrides} costTypeOverrides={costTypeOverrides}
                  globalRateOverrides={globalRateOverrides}
                  settings={settings} onSettingsOpen={()=>setShowSettings(true)} customAssemblies={customAssemblies}
                  procurement={procurement} asmOverrides={asmOverrides}/>
              </div>
            </div>
          ) : activeView === "tracker" ? (
            /* Tracker view */
            <div className="flex flex-1 overflow-hidden">
              <TrackerView
                instances={instances} tier={tier} rateOverrides={rateOverrides} costTypeOverrides={costTypeOverrides}
                globalRateOverrides={globalRateOverrides} settings={settings}
                purchases={purchases} onAddPurchase={addPurchase} onDeletePurchase={deletePurchase}
                catProgress={catProgress} onProgressChange={(cat, pct) => setCatProgress(p => ({...p, [cat]: pct}))}
                customAssemblies={customAssemblies}
                procurement={procurement} asmOverrides={asmOverrides}/>
            </div>
          ) : activeView === "procurement" ? (
            /* Procurement checklist */
            <div className="flex flex-1 overflow-hidden">
              <ProcurementView
                procurement={procurement} onProcurementChange={setProcurement}
                purchases={purchases} onAddPurchase={addPurchase} onDeletePurchase={deletePurchase}
                planData={planData} customAssemblies={customAssemblies}
                asmOverrides={asmOverrides}/>
            </div>
          ) : (
            /* Plan / Gantt view */
            <div className="flex flex-1 overflow-hidden">
              <PlanView planData={planData} onPlanChange={setPlanData}/>
            </div>
          )}

          {addingDef && <AssemblyFormModal asmDef={addingDef} initialInputs={null} initialMaterialMode="estimate" onSave={(inputs,mm)=>addAssembly(addingDef,inputs,mm)} onClose={()=>setAddingDef(null)}/>}
          {editingPair && <AssemblyFormModal asmDef={editingPair.def} initialInputs={editingPair.instance.inputs} initialMaterialMode={editingPair.instance.materialMode} onSave={(inputs,mm)=>updateAssembly(editingPair.instance.id,inputs,mm)} onClose={()=>setEditingPair(null)}/>}
          {showSettings && <SettingsModal settings={settings} onUpdate={setSettings} onClose={()=>setShowSettings(false)}/>}
        </div>
      );
    }

    // =========================================================================
    // APP ROOT — manages project list + active project
    // =========================================================================
    function App() {
      const [appData, setAppData] = useState(() => {
        const loaded = loadAppData();
        return loaded ?? { activeProjectId: null, config: {...DEFAULT_CONFIG}, projects: [] };
      });

      useEffect(() => { saveAppData(appData); }, [appData]);

      const { activeProjectId, projects, config } = appData;
      const safeConfig = config ?? {...DEFAULT_CONFIG};
      const activeProject = projects.find(p => p.id === activeProjectId) ?? null;

      const openProject   = id   => setAppData(d => ({...d, activeProjectId: id}));
      const goHome        = ()   => setAppData(d => ({...d, activeProjectId: null}));
      const updateConfig  = cfg  => setAppData(d => ({...d, config: cfg}));
      const addProject    = name => {
        const p = BLANK_PROJECT(name);
        setAppData(d => ({...d, projects:[...d.projects, p], activeProjectId: p.id}));
      };
      const deleteProject = id => {
        if (!confirm("Delete this project? This cannot be undone.")) return;
        setAppData(d => ({
          ...d,
          projects: d.projects.filter(p => p.id !== id),
          activeProjectId: d.activeProjectId === id ? null : d.activeProjectId,
        }));
      };
      const updateProject = (id, data) => {
        setAppData(d => ({...d, projects: d.projects.map(p => p.id === id ? {...p, ...data} : p)}));
      };

      if (!activeProject) {
        return <HomeView projects={projects} onOpen={openProject} onAdd={addProject} onDelete={deleteProject}
          config={safeConfig} onConfigChange={updateConfig}/>;
      }
      return <TradeScope
        key={activeProjectId}
        initialData={activeProject}
        onUpdate={data => updateProject(activeProjectId, data)}
        onGoHome={goHome}
        onSwitchProject={openProject}
        allProjects={projects}
        config={safeConfig}
      />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
